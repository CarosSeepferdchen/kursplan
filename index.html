// ── Kurse-Ansicht ─────────────────────────────────────────────────

function renderKurse() {
    renderDayChips();
    const wrap = document.getElementById('kurse-list');
    const q = (document.getElementById('search-input').value || '').toLowerCase().trim();

    if (q) {
        const treffer = state.kinder
            .filter(k => k.name.toLowerCase().includes(q))
            .sort((a, b) => a.name.localeCompare(b.name, 'de'));
        if (!treffer.length) {
            wrap.innerHTML = `<div class="empty-state"><h3>Keine Treffer für „${esc(q)}"</h3></div>`;
            return;
        }
        wrap.innerHTML = `<div class="kurs-card"><div class="kurs-card-head"><div class="kurs-head-left">
            <div class="kurs-title">Suche: „${esc(q)}"</div>
            <div class="kurs-sub">${treffer.length} Kind${treffer.length !== 1 ? 'er' : ''} gefunden</div>
            </div></div><div class="kurs-kinder">${treffer.map(k => kindBlockHTML(k, true)).join('')}</div></div>`;
        return;
    }

    let html = '';
    if (currentDay === 'alle') {
        const alleKurse = _kurseNachZeit();
        if (alleKurse.length) {
            alleKurse.forEach(kurs => html += kursCardHTML(kurs));
        } else if (!kinderOhneKurs().length) {
            html += emptyKurseHTML();
        }
    } else {
        const kurse = kurseAmTag(currentDay);
        if (kurse.length) kurse.forEach(kurs => html += kursCardHTML(kurs));
        else html += `<div class="empty-state"><h3>Keine Kurse am ${WOCHENTAGE[currentDay]}</h3><p>Klick auf „+ Kurs anlegen" um einen Kurs für diesen Tag zu erstellen.</p></div>`;
    }

    const ohne = kinderOhneKurs();
    if (ohne.length) {
        html += `<div class="kurs-card ohne-kurs"><div class="kurs-card-head"><div class="kurs-head-left">
            <div class="kurs-title">Ohne Kurs</div>
            <div class="kurs-sub">${ohne.length} Kind${ohne.length !== 1 ? 'er' : ''} · über ✏ einem Kurs zuordnen</div>
            </div></div><div class="kurs-kinder">${ohne.map(k => kindBlockHTML(k)).join('')}</div></div>`;
    }

    wrap.innerHTML = html;
}

function emptyKurseHTML() {
    return `<div class="empty-state"><h3>Noch keine Kurse angelegt</h3>
        <p>Leg deinen ersten Kurs an, z.B. „Mittwoch 15:00 Anfänger".</p></div>`;
}

function kursCardHTML(kurs) {
    const kinder = kinderImKurs(kurs.id);
    const cf = kursFarbe(kurs.id);
    let zeit = '';
    if (kurs.von) zeit = `<span class="kurs-time-badge" style="background:${cf.hell};color:${cf.farbe}">${kurs.von}${kurs.bis ? '–' + kurs.bis : ''}</span>`;
    const kinderHTML = kinder.length
        ? kinder.map(k => kindBlockHTML(k)).join('')
        : `<div class="kurs-empty">${trainerMode ? 'Noch keine Kinder · „＋ Kind" zum Hinzufügen' : 'Noch keine Kinder eingetragen'}</div>`;
    return `<div class="kurs-card" style="border-left-color:${cf.farbe}">
        <div class="kurs-card-head" style="background:${cf.hell}">
            <div class="kurs-head-left">
                <div class="kurs-title" style="color:${cf.farbe}">${esc(kurs.name)}</div>
                <div class="kurs-sub">${WOCHENTAGE[kurs.wochentag]} ${zeit}${kurs.jahrgang ? ' · ' + formatJahrgang(kurs.jahrgang, kurs.jahrgangBis) : ''} · ${kinder.length} Kind${kinder.length !== 1 ? 'er' : ''}</div>
            </div>
            <div class="kurs-actions">
                <button class="btn btn-sm trainer-only" style="background:${cf.farbe};color:white" onclick="openAddKind('${kurs.id}')">＋ Kind</button>
                <button class="icon-btn trainer-only" onclick="openEditKurs('${kurs.id}')" title="Kurs bearbeiten">🔧</button>
                <button class="icon-btn trainer-only" onclick="deleteKurs('${kurs.id}')" title="Kurs löschen">🗑</button>
            </div>
        </div>
        <div class="kurs-kinder">${kinderHTML}</div>
    </div>`;
}

// ── Kind-Zeile + Logbuch ──────────────────────────────────────────

function kindBlockHTML(kind, showKurs) {
    const expanded = kind.id === expandedKindId;
    let sub = '';
    if (showKurs) {
        const kurs = getKurs(kind.kursId);
        sub = kurs ? esc(kurs.name) : 'ohne Kurs';
    }
    return `<div class="kind-block ${expanded ? 'expanded' : ''}">
        <div class="kind-row" onclick="toggleKind('${kind.id}')">
            <span class="kind-caret">▶</span>
            <div class="kind-row-main">
                <div class="kind-row-name">${esc(kind.name)}</div>
                ${sub ? `<div class="kind-row-sub">${sub}</div>` : ''}
            </div>
            <div class="kind-summary" id="kindsum-${kind.id}">${kindSummaryInner(kind)}</div>
            <button class="kind-row-x" onclick="event.stopPropagation();deleteKind('${kind.id}')" title="Kind löschen">×</button>
        </div>
        ${expanded ? `<div class="logbook"><div id="logbook-panel">${logbookInnerHTML(kind)}</div></div>` : ''}
    </div>`;
}

function kindSummaryInner(kind) {
    const fertig = alleStufenFertig(kind);
    const st = aktuelleStufe(kind);
    const p = getStufenProgress(kind, st.id);
    return `<span class="kind-sum-dot" style="background:${st.farbe}"></span>
        <span class="kind-sum-stufe">${fertig ? 'Gold ✓' : esc(st.name)}</span>
        <div class="mini-bar"><div style="width:${p.pct}%;background:${st.farbe}"></div></div>
        <span class="kind-sum-count">${p.done}/${p.total}</span>`;
}

function logbookInnerHTML(kind) {
    if (!logbookPage) logbookPage = aktuelleStufe(kind).id;
    const stufe = getStufe(logbookPage) || state.badges[0];
    const seite = state.badges.findIndex(b => b.id === stufe.id) + 1;

    const tabs = state.badges.map(st => {
        const p = getStufenProgress(kind, st.id);
        const complete = p.total > 0 && p.done === p.total;
        const active = st.id === stufe.id;
        return `<button class="logbook-tab ${active ? 'active' : ''}" style="${active ? 'background:' + st.farbe : ''}" onclick="event.stopPropagation();selectLogbookPage('${st.id}')">
            ${esc(st.name)}<span class="lb-ind ${complete ? 'lb-complete' : ''}">${complete ? '✓' : p.done + '/' + p.total}</span>
        </button>`;
    }).join('');

    let body;
    if (!stufe.anforderungen.length) {
        body = `<div class="lb-leer">Noch keine Aufgaben für „${esc(stufe.name)}".<br>Schick mir die Punkte – oder trage sie im Tab „Abzeichen" selbst ein.</div>`;
    } else {
        const prog = (kind.progress || {})[stufe.id] || {};
        const rendered = stufe.anforderungen.map(anf => {
            const done = !!prog[anf.id];
            const note = prog[anf.id + '_note'] || '';
            const datum = prog[anf.id + '_datum'] || '';
            const trigId = `datum-${kind.id}-${anf.id}`;
            const datumEl = done
                ? (datum
                    ? `<span class="lb-datum" id="${trigId}" onclick="event.stopPropagation();showDatumInput('${kind.id}','${stufe.id}','${anf.id}','${trigId}')">${datum}</span>`
                    : `<span class="lb-datum-trigger trainer-only" id="${trigId}" onclick="event.stopPropagation();showDatumInput('${kind.id}','${stufe.id}','${anf.id}','${trigId}')"></span>`)
                : '';
            const sticker = prog[anf.id + '_sticker'] || 0;
            return `<div class="lb-task ${done ? 'lb-done' : ''}" id="lbtask-${anf.id}" onclick="event.stopPropagation()">
                <span class="lb-task-text" onclick="toggleAufgabe('${kind.id}','${stufe.id}','${anf.id}',${!done})">${esc(anf.text)}${datumEl}</span>
                <div class="lb-sticker" id="sticker-${anf.id}">${stickerDropsHTML(kind.id, stufe.id, anf.id, sticker)}</div>
                <input class="lb-note" type="text" value="${esc(note)}" placeholder="Notiz…" ${(trainerMode || editorMode) ? '' : 'readonly'} onclick="event.stopPropagation()" onblur="saveNotiz('${kind.id}','${stufe.id}','${anf.id}',this.value)">
                <input class="lb-cb" type="checkbox" ${done ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleAufgabe('${kind.id}','${stufe.id}','${anf.id}',this.checked)">
            </div>`;
        });
        body = rendered.join('');
    }

    const anmerkung = kind.anmerkung || '';
    const abzDatum = ((kind.progress || {})[stufe.id] || {})['_abzeichen_datum'] || '';
    const stufeP = getStufenProgress(kind, stufe.id);
    const stufeKomplett = stufeP.total > 0 && stufeP.done === stufeP.total;
    return `<textarea class="lb-anmerkung" ${(trainerMode || editorMode) ? '' : 'readonly'} placeholder="Individuelle Anmerkungen zum Kind…" onclick="event.stopPropagation()" onblur="saveKindAnmerkung('${kind.id}',this.value)">${esc(anmerkung)}</textarea>
        <div class="lb-page-title"><span class="kind-sum-dot" style="width:13px;height:13px;background:${stufe.farbe}"></span>${esc(stufe.name)}<span class="lb-page-num">Seite ${seite} von ${state.badges.length}</span></div>
        ${stufeKomplett ? `<div class="lb-abz-datum-row">Abzeichen erworben: ${abzDatum
            ? `<span class="lb-abz-datum-val" id="abz-${kind.id}-${stufe.id}" onclick="event.stopPropagation();showAbzDatumInput('${kind.id}','${stufe.id}','abz-${kind.id}-${stufe.id}')">${abzDatum}</span>`
            : `<span class="lb-abz-datum-trigger trainer-only" id="abz-${kind.id}-${stufe.id}" onclick="event.stopPropagation();showAbzDatumInput('${kind.id}','${stufe.id}','abz-${kind.id}-${stufe.id}')"></span>`
        }</div>` : ''}
        <div class="logbook-tabs">${tabs}</div>
        <div>${body}</div>
        <div class="logbook-actions trainer-only">
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openEditKind('${kind.id}')" style="flex:1">✏ Kind bearbeiten</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteKind('${kind.id}')">Löschen</button>
        </div>`;
}

function saveKindAnmerkung(kindId, value) {
    const kind = kindObj(kindId); if (!kind) return;
    kind.anmerkung = value.trim();
    save();
}

function saveNotiz(kindId, stufeId, anfId, value) {
    const kind = kindObj(kindId); if (!kind) return;
    if (!kind.progress) kind.progress = {};
    if (!kind.progress[stufeId]) kind.progress[stufeId] = {};
    const key = anfId + '_note';
    if (value.trim()) kind.progress[stufeId][key] = value.trim();
    else delete kind.progress[stufeId][key];
    save();
}

// Sticker-Tropfen: 3 Kreise pro Aufgabe, gefüllte sehen aus wie Wassertropfen
function stickerDropsHTML(kindId, stufeId, anfId, count) {
    return [1, 2, 3].map(n =>
        `<button type="button" class="lb-drop ${n <= count ? 'filled' : ''}" title="Sticker ${n} von 3" onclick="event.stopPropagation();setSticker('${kindId}','${stufeId}','${anfId}',${n})"></button>`
    ).join('');
}

function setSticker(kindId, stufeId, anfId, n) {
    const kind = kindObj(kindId); if (!kind) return;
    if (!kind.progress) kind.progress = {};
    if (!kind.progress[stufeId]) kind.progress[stufeId] = {};
    const key = anfId + '_sticker';
    const cur = kind.progress[stufeId][key] || 0;
    const next = (cur === n) ? n - 1 : n;   // erneut auf den letzten klicken → einen weniger
    if (next > 0) kind.progress[stufeId][key] = next;
    else delete kind.progress[stufeId][key];
    save();
    // nur die betroffene Tropfen-Reihe neu zeichnen (Notiz-Fokus bleibt erhalten)
    const box = document.getElementById('sticker-' + anfId);
    if (box) box.innerHTML = stickerDropsHTML(kindId, stufeId, anfId, next);
}

function toggleKind(id) {
    if (expandedKindId === id) {
        expandedKindId = null;
        logbookPage = null;             // Seite zurücksetzen beim Schließen
    } else {
        expandedKindId = id;
        logbookPage = null;             // immer frisch starten für neues Kind
        const k = kindObj(id);
        if (k) logbookPage = aktuelleStufe(k).id;
    }
    renderKurse();
}

function selectLogbookPage(stufeId) {
    logbookPage = stufeId;
    const panel = document.getElementById('logbook-panel');
    if (panel && expandedKindId) panel.innerHTML = logbookInnerHTML(kindObj(expandedKindId));
}

function toggleAufgabe(kindId, stufeId, anfId, checked) {
    const kind = kindObj(kindId); if (!kind) return;
    if (!kind.progress) kind.progress = {};
    if (!kind.progress[stufeId]) kind.progress[stufeId] = {};
    // false explizit löschen statt speichern — vermeidet Zombie-Keys im progress-Objekt
    if (checked) {
        kind.progress[stufeId][anfId] = true;
    } else {
        delete kind.progress[stufeId][anfId];
        delete kind.progress[stufeId][anfId + '_datum'];
    }
    // Abzeichen-Datum löschen wenn Stufe nicht mehr vollständig
    const p = getStufenProgress(kind, stufeId);
    if (!(p.total > 0 && p.done === p.total)) {
        delete kind.progress[stufeId]['_abzeichen_datum'];
    }
    save();
    const panel = document.getElementById('logbook-panel');
    if (panel) panel.innerHTML = logbookInnerHTML(kind);
    const sum = document.getElementById('kindsum-' + kindId);
    if (sum) sum.innerHTML = kindSummaryInner(kind);
}

function formatFuerInput(datum) {
    // "05.06.2026" → "2026-06-05" für <input type="date">
    if (!datum) return '';
    const [d, m, y] = datum.split('.');
    return (y && m && d) ? `${y}-${m}-${d}` : '';
}
function formatVonInput(val) {
    // "2026-06-05" → "05.06.2026" für die Speicherung
    if (!val) return '';
    const [y, m, d] = val.split('-');
    return (y && m && d) ? `${d}.${m}.${y}` : '';
}

function speicherDatum(kindId, stufeId, anfId, val) {
    const kind = kindObj(kindId); if (!kind) return;
    if (!kind.progress?.[stufeId]) return;
    const datum = formatVonInput(val);
    if (datum) kind.progress[stufeId][anfId + '_datum'] = datum;
    else delete kind.progress[stufeId][anfId + '_datum'];
    save();
}

function speicherAbzeichenDatum(kindId, stufeId, val) {
    const kind = kindObj(kindId); if (!kind) return;
    if (!kind.progress[stufeId]) kind.progress[stufeId] = {};
    const datum = formatVonInput(val);
    if (datum) kind.progress[stufeId]['_abzeichen_datum'] = datum;
    else delete kind.progress[stufeId]['_abzeichen_datum'];
    save();
}

function showDatumInput(kindId, stufeId, anfId, triggerId) {
    const trigger = document.getElementById(triggerId);
    if (!trigger) return;
    const datum = kindObj(kindId)?.progress?.[stufeId]?.[anfId + '_datum'] || '';
    const inp = document.createElement('input');
    inp.type = 'date'; inp.className = 'lb-datum-input';
    inp.value = formatFuerInput(datum);
    inp.onclick = e => e.stopPropagation();
    inp.onchange = () => {
        speicherDatum(kindId, stufeId, anfId, inp.value);
        const panel = document.getElementById('logbook-panel');
        if (panel) panel.innerHTML = logbookInnerHTML(kindObj(kindId));
    };
    inp.onblur = () => {
        const panel = document.getElementById('logbook-panel');
        if (panel) panel.innerHTML = logbookInnerHTML(kindObj(kindId));
    };
    trigger.replaceWith(inp);
    setTimeout(() => { inp.focus(); try { inp.showPicker(); } catch(_) {} }, 10);
}

function showAbzDatumInput(kindId, stufeId, triggerId) {
    const trigger = document.getElementById(triggerId);
    if (!trigger) return;
    const datum = kindObj(kindId)?.progress?.[stufeId]?.['_abzeichen_datum'] || '';
    const inp = document.createElement('input');
    inp.type = 'date'; inp.className = 'lb-abz-datum-input';
    inp.value = formatFuerInput(datum);
    inp.onclick = e => e.stopPropagation();
    inp.onchange = () => {
        speicherAbzeichenDatum(kindId, stufeId, inp.value);
        const panel = document.getElementById('logbook-panel');
        if (panel) panel.innerHTML = logbookInnerHTML(kindObj(kindId));
    };
    inp.onblur = () => {
        const panel = document.getElementById('logbook-panel');
        if (panel) panel.innerHTML = logbookInnerHTML(kindObj(kindId));
    };
    trigger.replaceWith(inp);
    setTimeout(() => { inp.focus(); try { inp.showPicker(); } catch(_) {} }, 10);
}

// ── Kurs add / edit / delete ──────────────────────────────────────

function fillTagSelect(selected) {
    document.getElementById('kurs-tag').innerHTML = WOCHENTAGE.map((t, i) =>
        `<option value="${i}" ${i === selected ? 'selected' : ''}>${t}</option>`
    ).join('');
}

function formatJahrgang(von, bis) {
    if (!von) return '';
    if (!bis || bis === von) return 'Jg. ' + von;
    return 'Jg. ' + von + '–' + String(bis).slice(-2);
}

function openAddKurs() {
    editKursId = null;
    document.getElementById('modal-kurs-title').textContent = 'Kurs anlegen';
    document.getElementById('kurs-name').value = '';
    document.getElementById('kurs-jahrgang').value = '';
    document.getElementById('kurs-jahrgang-bis').value = '';
    document.getElementById('kurs-von').value = '';
    document.getElementById('kurs-bis').value = '';
    fillTagSelect(currentDay === 'alle' ? HEUTE : currentDay);
    openModal('modal-kurs');
    setTimeout(() => document.getElementById('kurs-name').focus(), 60);
}

function openEditKurs(id) {
    editKursId = id;
    const kurs = getKurs(id); if (!kurs) return;
    document.getElementById('modal-kurs-title').textContent = 'Kurs bearbeiten';
    document.getElementById('kurs-name').value = kurs.name;
    document.getElementById('kurs-jahrgang').value = kurs.jahrgang || '';
    document.getElementById('kurs-jahrgang-bis').value = kurs.jahrgangBis || '';
    document.getElementById('kurs-von').value = kurs.von || '';
    document.getElementById('kurs-bis').value = kurs.bis || '';
    fillTagSelect(kurs.wochentag);
    openModal('modal-kurs');
}

function saveKurs() {
    const name = document.getElementById('kurs-name').value.trim();
    if (!name) { document.getElementById('kurs-name').focus(); return; }
    const wochentag   = parseInt(document.getElementById('kurs-tag').value);
    const jahrgang    = parseInt(document.getElementById('kurs-jahrgang').value) || null;
    const jahrgangBis = parseInt(document.getElementById('kurs-jahrgang-bis').value) || null;
    const von = document.getElementById('kurs-von').value;
    const bis = document.getElementById('kurs-bis').value;
    if (editKursId) {
        Object.assign(getKurs(editKursId), { name, wochentag, jahrgang, jahrgangBis, von, bis });
    } else {
        state.kurse.push({ id: uid(), name, wochentag, jahrgang, jahrgangBis, von, bis });
    }
    currentDay = wochentag;
    save(); closeModal('modal-kurs'); renderKurse();
}

function deleteKurs(id) {
    const kurs = getKurs(id); if (!kurs) return;
    const anzahl = kinderImKurs(id).length;
    const msg = anzahl > 0
        ? `Kurs „${kurs.name}" löschen?\n\nDie ${anzahl} Kind${anzahl !== 1 ? 'er' : ''} werden NICHT gelöscht – sie landen unter „Ohne Kurs".`
        : `Kurs „${kurs.name}" löschen?`;
    if (!confirm(msg)) return;
    state.kinder.forEach(k => { if (k.kursId === id) k.kursId = null; });
    state.kurse = state.kurse.filter(k => k.id !== id);
    save(); renderKurse();
}

// ── Kind add / edit / delete ──────────────────────────────────────

function fillKursSelect(selectedId) {
    let html = '<option value="">— Kein Kurs —</option>';
    WOCHENTAGE.forEach((tag, di) => {
        const kurse = kurseAmTag(di);
        if (!kurse.length) return;
        html += `<optgroup label="${tag}">`;
        kurse.forEach(k => {
            const zeit = k.von ? ' (' + k.von + ')' : '';
            html += `<option value="${k.id}" ${k.id === selectedId ? 'selected' : ''}>${esc(k.name)}${zeit}</option>`;
        });
        html += '</optgroup>';
    });
    document.getElementById('kind-kurs').innerHTML = html;
}

function openAddKind(presetKursId) {
    editKindId = null;
    document.getElementById('modal-kind-title').textContent = 'Kind hinzufügen';
    document.getElementById('kind-name').value = '';
    document.getElementById('kind-pdf-btn').style.display = 'none';
    fillKursSelect(presetKursId || '');
    openModal('modal-kind');
    setTimeout(() => document.getElementById('kind-name').focus(), 60);
}

function openEditKind(id) {
    editKindId = id;
    const kind = kindObj(id); if (!kind) return;
    document.getElementById('modal-kind-title').textContent = 'Kind bearbeiten';
    document.getElementById('kind-name').value = kind.name;
    document.getElementById('kind-pdf-btn').style.display = 'block';
    fillKursSelect(kind.kursId || '');
    openModal('modal-kind');
}

function saveKind() {
    const name = document.getElementById('kind-name').value.trim();
    if (!name) { document.getElementById('kind-name').focus(); return; }
    const kursId = document.getElementById('kind-kurs').value || null;
    if (editKindId) {
        Object.assign(kindObj(editKindId), { name, kursId });
    } else {
        state.kinder.push({ id: uid(), name, kursId, progress: {} });
    }
    save(); closeModal('modal-kind'); renderKurse();
}

function deleteKind(id) {
    const kind = kindObj(id); if (!kind) return;
    if (!confirm(`„${kind.name}" wirklich löschen?`)) return;
    state.kinder = state.kinder.filter(k => k.id !== id);
    if (expandedKindId === id) expandedKindId = null;
    save(); renderKurse();
}

// ── Abzeichen / Stufen-Tab ────────────────────────────────────────

function renderStufen() {
    document.getElementById('badges-list').innerHTML = state.badges.map((stufe, i) => {
        const geschafft = state.kinder.filter(k => {
            const p = getStufenProgress(k, stufe.id);
            return p.total > 0 && p.done === p.total;
        }).length;
        const aufgaben = stufe.anforderungen.length
            ? stufe.anforderungen.map(a => `<div class="badge-req-row">${esc(a.text)}</div>`).join('')
            : '<div class="badge-req-leer">Noch keine Aufgaben eingetragen.</div>';
        return `<div class="badge-card" style="border-left-color:${stufe.farbe}">
            <div class="badge-card-header">
                <span class="badge-card-title"><span class="badge-page-num">${i+1}</span>${esc(stufe.name)}</span>
                <button class="btn btn-secondary btn-sm trainer-only" onclick="openEditStufe('${stufe.id}')">Aufgaben bearbeiten</button>
            </div>
            <div class="badge-card-meta">${stufe.anforderungen.length} Aufgabe${stufe.anforderungen.length !== 1 ? 'n' : ''} · ${geschafft} Kind${geschafft !== 1 ? 'er' : ''} ${geschafft === 1 ? 'hat' : 'haben'} diese Stufe geschafft</div>
            <div>${aufgaben}</div>
        </div>`;
    }).join('');
}

function openEditStufe(id) {
    editStufeId = id;
    const stufe = getStufe(id); if (!stufe) return;
    document.getElementById('modal-badge-title').textContent = 'Stufe: ' + stufe.name;
    document.getElementById('badge-name').value = stufe.name;
    document.getElementById('badge-color').value = stufe.farbe;
    document.getElementById('anf-builder').innerHTML = '';
    if (stufe.anforderungen.length) stufe.anforderungen.forEach(a => addAnfRow(a.text));
    else { addAnfRow(); addAnfRow(); addAnfRow(); }
    openModal('modal-badge');
}

function addAnfRow(value = '') {
    const row = document.createElement('div');
    row.className = 'anf-row';
    row.innerHTML = `<input class="anf-input" type="text" value="${esc(value)}" placeholder="Aufgabe beschreiben…">
        <button class="anf-del" onclick="this.closest('.anf-row').remove()" title="Entfernen">×</button>`;
    document.getElementById('anf-builder').appendChild(row);
}

function saveStufe() {
    const stufe = getStufe(editStufeId); if (!stufe) return;
    const name = document.getElementById('badge-name').value.trim() || stufe.name;
    const farbe = document.getElementById('badge-color').value;
    const neue = [];
    const inputs = [...document.querySelectorAll('#anf-builder .anf-input')];
    inputs.forEach((inp, idx) => {
        const text = inp.value.trim();
        if (text) {
            // Aufgabe an derselben Position behält ihre ID (auch bei Umbenennen)
            const alt = stufe.anforderungen[idx];
            if (alt) {
                neue.push({ id: alt.id, text });
            } else {
                neue.push({ id: uid(), text });
            }
        }
    });
    Object.assign(stufe, { name, farbe, anforderungen: neue });
    save(); closeModal('modal-badge'); renderStufen(); renderKurse();
}

// ── Modal helpers ─────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(el =>
    el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); })
);
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.querySelectorAll('.modal-bg.open').forEach(m => closeModal(m.id));
});

document.addEventListener('click', e => {
    const btn = e.target.closest('.btn, .chip, .header-btn, .nav-tab');
    if (!btn) return;
    const ripple = document.createElement('span');
    const d = Math.max(btn.clientWidth, btn.clientHeight) * 2.5;
    const rect = btn.getBoundingClientRect();
    ripple.className = 'water-ripple';
    ripple.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
}, true);

// ── Teilen / PDF ──────────────────────────────────────────────────

// Einzelner Kind-Block für die PDF (genutzt von teilen() und teileKind())
function kindPDFBlock(kind) {
    const fertig = alleStufenFertig(kind);
    const aktStufe = aktuelleStufe(kind);
    const aktP = getStufenProgress(kind, aktStufe.id);
    const prog = (kind.progress || {})[aktStufe.id] || {};

    // Stufen-Fortschritts-Bubbles
    const bubbles = state.badges.map(st => {
        const p = getStufenProgress(kind, st.id);
        const done = p.total > 0 && p.done === p.total;
        const active = st.id === aktStufe.id && !fertig;
        const opacity = done ? 1 : (active ? 0.8 : 0.18);
        const label = done ? '✓' : (active ? `${p.done}/${p.total}` : '');
        return `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${st.farbe};opacity:${opacity};font-size:6.5px;font-weight:800;color:white;margin-right:2px;flex-shrink:0">${label}</span>`;
    }).join('');

    // Erhaltene Abzeichen — nur die mit eingetragenem Datum
    const erhalten = state.badges.filter(st =>
        !!(((kind.progress || {})[st.id] || {})['_abzeichen_datum'])
    );
    const abzeichenZeile = erhalten.length
        ? `<div style="font-size:9px;color:#475569;margin-bottom:4px;background:#fffbeb;border:1px solid #fde68a;border-radius:5px;padding:3px 7px">🏅 <b>Abzeichen erhalten:</b> ${erhalten.map(st => {
              const d = ((kind.progress || {})[st.id] || {})['_abzeichen_datum'] || '';
              return `<span style="font-weight:700;color:${st.farbe}">${esc(st.name)}</span> <span style="color:#0891b2;font-size:8px">(${d})</span>`;
          }).join(' &middot; ')}</div>`
        : `<div style="font-size:9px;color:#94a3b8;font-style:italic;margin-bottom:4px">Noch keine Abzeichen erhalten</div>`;

    // Aufgaben der aktuellen Stufe
    let aufgabenHTML = '';
    const noteHTML = txt => txt ? `<div style="font-size:8px;color:#92400e;padding:0 0 1.5px 14px">📝 ${esc(txt)}</div>` : '';
    aktStufe.anforderungen.forEach(anf => {
        const done = !!prog[anf.id];
        const d = prog[anf.id + '_datum'] || '';
        aufgabenHTML += `<div style="font-size:9px;padding:1.5px 0;color:${done ? '#16a34a' : '#aaa'}">${done ? '✓' : '○'} ${esc(anf.text)}${d ? ` <span style="color:#0891b2;font-size:8px">${d}</span>` : ''}</div>`;
        aufgabenHTML += noteHTML(prog[anf.id + '_note'] || '');
    });

    const abzDatum = prog['_abzeichen_datum'] || '';
    const stufenLabel = fertig
        ? `<b style="color:#ca8a04">Alle Abzeichen erreicht ✓</b>`
        : `<b>${esc(aktStufe.name)}</b> <span style="color:#94a3b8">${aktP.done}/${aktP.total}</span>${abzDatum ? ` &middot; <span style="color:#0891b2">Abzeichen: ${abzDatum}</span>` : ''}`;

    // Allgemeine Anmerkung zum Kind
    const anmerkung = (kind.anmerkung || '').trim();
    const anmerkungZeile = anmerkung
        ? `<div style="font-size:8.5px;color:#334155;background:#f1f5f9;border-left:3px solid #94a3b8;padding:3px 7px;margin-top:5px;border-radius:3px">📝 <b>Anmerkung:</b> ${esc(anmerkung)}</div>`
        : '';

    return `<div style="border-bottom:1px solid #f0f0f0;padding:7px 10px;page-break-inside:avoid">
        <div style="font-size:12px;font-weight:700;margin-bottom:4px">${esc(kind.name)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px">${bubbles}</div>
        ${abzeichenZeile}
        <div style="font-size:9px;color:#475569;font-weight:600;margin-bottom:3px">${stufenLabel}</div>
        <div style="padding-left:6px">${aufgabenHTML}</div>
        ${anmerkungZeile}
    </div>`;
}

// Öffnet das druckbare PDF-Fenster (gemeinsam für Tages- und Einzel-PDF)
function pdfFensterOeffnen(titel, datum, bodyHTML, dateiname) {
    const htmlName = dateiname.replace('.pdf', '.html');
    const html = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<title>Caros Seepferdchen &mdash; ${esc(titel)} &middot; ${datum}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:1.2cm;color:#111;font-size:11px}
.topbar{position:sticky;top:0;background:#fff;border-bottom:2px solid #f97316;padding:8px 1.2cm;display:flex;justify-content:space-between;align-items:center;z-index:99;margin:-1.2cm -1.2cm 1cm -1.2cm}
.save-btn{background:#c2410c;color:white;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#9a3412}
@media print{.topbar{display:none}body{padding:0.7cm}}
</style></head><body>
<div class="topbar">
    <button onclick="window.close()" style="background:none;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;font-family:inherit;color:#64748b">← Zurück</button>
    <span style="font-size:13px;font-weight:800;color:#c2410c">Caros Seepferdchen &mdash; ${esc(titel)}</span>
    <button class="save-btn" onclick="speichern()">In Dateien sichern</button>
</div>
<div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #f97316;padding-bottom:10px;margin-bottom:16px">
    <div style="font-size:19px;font-weight:900;color:#c2410c">Caros Seepferdchen</div>
    <div style="font-size:10px;color:#666;text-align:right">${esc(titel)}<br>${datum}</div>
</div>
${bodyHTML}
<script>
async function speichern() {
    const htmlStr = '<!DOCTYPE html>' + document.documentElement.outerHTML;
    const blob = new Blob([htmlStr], { type: 'text/html' });
    const file = new File([blob], '${htmlName}', { type: 'text/html' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'Caros Seepferdchen' }); return; }
        catch(e) { if (e.name === 'AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '${htmlName}';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}
<\/script>
</body></html>`;
    const win = window.open('', '_blank');
    if (win) { win.document.write(html); win.document.close(); }
    else alert('Bitte Popups für diese Seite erlauben.');
}

// PDF für ein einzelnes Kind (vom Bearbeiten-Dialog aus)
function teileKind(kindId) {
    const kind = kindObj(kindId); if (!kind) return;
    const datum = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const kurs = kind.kursId ? getKurs(kind.kursId) : null;
    let body;
    if (kurs) {
        const cf = kursFarbe(kurs.id);
        const zeit = kurs.von ? ` &middot; ${kurs.von}${kurs.bis ? '&ndash;' + kurs.bis : ''}` : '';
        body = `<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;page-break-inside:avoid">
            <div style="background:${cf.hell};border-left:4px solid ${cf.farbe};padding:7px 10px">
                <div style="font-size:13px;font-weight:800;color:${cf.farbe}">${esc(kurs.name)}</div>
                <div style="font-size:9px;color:#666;margin-top:2px">${WOCHENTAGE[kurs.wochentag]}${zeit}${kurs.jahrgang ? ' &middot; ' + formatJahrgang(kurs.jahrgang, kurs.jahrgangBis) : ''}</div>
            </div>
            ${kindPDFBlock(kind)}
        </div>`;
    } else {
        body = `<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;page-break-inside:avoid">${kindPDFBlock(kind)}</div>`;
    }
    const safeName = kind.name.replace(/[^0-9A-Za-zÄÖÜäöüß]+/g, '-');
    const dateiname = `CarosSeepferdchen_${safeName}_${datum.replace(/\./g,'-')}.pdf`;
    pdfFensterOeffnen(kind.name, datum, body, dateiname);
}

// Anwesenheit teilen: Wochen-Auswahl für den aktuellen Wochentag öffnen
function oeffneAnwTeilen() {
    if (!anwesenheitDatum) anwesenheitDatum = isoAnwHeute();
    const tag = (new Date(anwesenheitDatum + 'T00:00:00').getDay() + 6) % 7;
    const kurse = kurseAmTag(tag);
    if (!kurse.length) { alert('Am ' + WOCHENTAGE[tag] + ' gibt es keine Kurse.'); return; }

    // Alle erfassten Termine (d-Schlüssel) der Kurse dieses Wochentags sammeln
    const set = new Set();
    kurse.forEach(k => Object.keys(state.anwesenheit[k.id] || {}).forEach(key => {
        if (key.startsWith('d-')) set.add(key.slice(2));
    }));
    const termine = [...set].sort();

    document.getElementById('anw-share-info').textContent =
        `${WOCHENTAGE[tag]} · ${kurse.length} Kurs${kurse.length !== 1 ? 'e' : ''} · Wochen antippen zum Aus-/Abwählen, mit × ganz entfernen`;
    const box = document.getElementById('anw-share-weeks');
    box.innerHTML = termine.length
        ? termine.map(t => {
            const dd = new Date(t + 'T00:00:00');
            const label = dd.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
            return `<div class="anw-week selected" data-date="${t}">
                <button type="button" class="anw-week-toggle" onclick="anwToggleWeek(this)">
                    <span class="anw-week-check">✓</span>
                    <span class="anw-week-label">${label} &middot; KW ${getISOWeek(dd)}</span>
                </button>
                <button type="button" class="anw-week-x" onclick="anwRemoveWeek(this)" title="Diese Woche aus der Liste entfernen">×</button>
            </div>`;
        }).join('')
        : `<div class="attendance-empty">Noch keine Anwesenheit für ${WOCHENTAGE[tag]} erfasst.</div>`;
    anwShareUpdateCount();
    openModal('modal-anw-share');
}

function anwToggleWeek(btn) {
    btn.closest('.anw-week').classList.toggle('selected');
    anwShareUpdateCount();
}

function anwRemoveWeek(btn) {
    const row = btn.closest('.anw-week');
    row.classList.add('removing');                 // sanft ausblenden …
    anwShareUpdateCount();                          // Zähler sofort anpassen
    setTimeout(() => { row.remove(); anwShareUpdateCount(); }, 250);  // … dann aus dem DOM nehmen
}

function anwShareAlle(selected) {
    document.querySelectorAll('#anw-share-weeks .anw-week').forEach(r => r.classList.toggle('selected', selected));
    anwShareUpdateCount();
}

function anwShareUpdateCount() {
    const rows = [...document.querySelectorAll('#anw-share-weeks .anw-week:not(.removing)')];
    const sel = rows.filter(r => r.classList.contains('selected')).length;
    const el = document.getElementById('anw-share-count');
    if (el) el.textContent = rows.length ? `${sel} von ${rows.length} ausgewählt` : '';
    const go = document.getElementById('anw-share-go');
    if (go) { go.disabled = sel === 0; go.style.opacity = sel === 0 ? '0.5' : ''; }
}

function anwShareErstellen() {
    const dates = [...document.querySelectorAll('#anw-share-weeks .anw-week.selected:not(.removing)')].map(r => r.dataset.date).sort();
    if (!dates.length) { alert('Bitte mindestens eine Woche auswählen.'); return; }
    const tag = (new Date(anwesenheitDatum + 'T00:00:00').getDay() + 6) % 7;
    const kurse = kurseAmTag(tag);
    const datumHeute = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const fmtKurz = iso => { const x = new Date(iso + 'T00:00:00'); return String(x.getDate()).padStart(2,'0') + '.' + String(x.getMonth()+1).padStart(2,'0') + '.'; };

    let body = `<div style="font-size:11px;color:#475569;margin-bottom:10px">Anwesenheit &middot; <b>${WOCHENTAGE[tag]}</b> &middot; ${dates.length} Termin${dates.length !== 1 ? 'e' : ''}</div>`;
    kurse.forEach(kurs => {
        const cf = kursFarbe(kurs.id);
        const kinder = kinderImKurs(kurs.id);
        const anw = state.anwesenheit[kurs.id] || {};
        const zeit = kurs.von ? ` &middot; ${kurs.von}${kurs.bis ? '&ndash;' + kurs.bis : ''}` : '';

        let head = `<th style="text-align:left;padding:4px 6px;border:1px solid #e5e7eb;background:#f8fafc">Kind</th>`;
        dates.forEach(t => head += `<th style="padding:4px 3px;border:1px solid #e5e7eb;background:#f8fafc;font-size:8px;white-space:nowrap">${fmtKurz(t)}</th>`);
        head += `<th style="padding:4px 6px;border:1px solid #e5e7eb;background:#f8fafc">&sum;</th>`;

        let rows = '';
        if (kinder.length) {
            kinder.forEach(k => {
                let total = 0;
                let cells = `<td style="text-align:left;padding:3px 6px;border:1px solid #eef2f7">${esc(k.name)}</td>`;
                dates.forEach(t => {
                    const da = (anw['d-' + t] || {})[k.id];
                    if (da) total++;
                    cells += `<td style="text-align:center;padding:3px;border:1px solid #eef2f7;color:${da ? '#16a34a' : '#cbd5e1'};font-weight:${da ? '700' : '400'}">${da ? '✓' : '·'}</td>`;
                });
                cells += `<td style="text-align:center;padding:3px 6px;border:1px solid #eef2f7;font-weight:700">${total}</td>`;
                rows += `<tr>${cells}</tr>`;
            });
            let sumCells = `<td style="text-align:left;padding:3px 6px;border:1px solid #eef2f7;font-weight:700;color:#64748b">anwesend</td>`;
            dates.forEach(t => {
                const c = kinder.filter(k => (anw['d-' + t] || {})[k.id]).length;
                sumCells += `<td style="text-align:center;padding:3px;border:1px solid #eef2f7;font-weight:700;color:#64748b">${c}</td>`;
            });
            sumCells += `<td style="border:1px solid #eef2f7;background:#f8fafc"></td>`;
            rows += `<tr style="background:#f8fafc">${sumCells}</tr>`;
        } else {
            rows = `<tr><td colspan="${dates.length + 2}" style="padding:6px;border:1px solid #eef2f7;color:#94a3b8;font-style:italic;font-size:9px">Keine Kinder in diesem Kurs</td></tr>`;
        }

        body += `<div style="margin-bottom:14px;page-break-inside:avoid">
            <div style="background:${cf.hell};border-left:4px solid ${cf.farbe};padding:6px 9px;border-radius:6px 6px 0 0">
                <span style="font-size:12px;font-weight:800;color:${cf.farbe}">${esc(kurs.name)}</span>
                <span style="font-size:9px;color:#666">${zeit}${kurs.jahrgang ? ' &middot; ' + formatJahrgang(kurs.jahrgang, kurs.jahrgangBis) : ''}</span>
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:9px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>
        </div>`;
    });

    const titel = 'Anwesenheit ' + WOCHENTAGE[tag];
    const dateiname = `CarosSeepferdchen_Anwesenheit_${WOCHENTAGE[tag]}_${datumHeute.replace(/\./g,'-')}.pdf`;
    closeModal('modal-anw-share');
    pdfFensterOeffnen(titel, datumHeute, body, dateiname);
}

function teilen() {
    const tag = currentDay;
    let kurse = [];
    if (tag === 'alle') {
        WOCHENTAGE.forEach((_, i) => kurse.push(...kurseAmTag(i)));
    } else {
        kurse = kurseAmTag(tag);
    }
    if (!kurse.length) { alert('Keine Kurse für diesen Tag.'); return; }

    const tagName = tag === 'alle' ? 'Alle Tage' : WOCHENTAGE[tag];
    const datum = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

    let body = '';
    kurse.forEach(kurs => {
        const cf = kursFarbe(kurs.id);
        const kinder = kinderImKurs(kurs.id);
        const zeit = kurs.von ? ` &middot; ${kurs.von}${kurs.bis ? '&ndash;' + kurs.bis : ''}` : '';
        const kinderHTML = kinder.length
            ? kinder.map(k => kindPDFBlock(k)).join('')
            : `<div style="padding:7px 10px;color:#94a3b8;font-style:italic;font-size:10px">Keine Kinder eingetragen</div>`;
        body += `<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;page-break-inside:avoid">
            <div style="background:${cf.hell};border-left:4px solid ${cf.farbe};padding:7px 10px">
                <div style="font-size:13px;font-weight:800;color:${cf.farbe}">${esc(kurs.name)}</div>
                <div style="font-size:9px;color:#666;margin-top:2px">${WOCHENTAGE[kurs.wochentag]}${zeit}${kurs.jahrgang ? ' &middot; ' + formatJahrgang(kurs.jahrgang, kurs.jahrgangBis) : ''} &middot; ${kinder.length} Kind${kinder.length !== 1 ? 'er' : ''}</div>
            </div>
            ${kinderHTML}
        </div>`;
    });

    const dateiname = `CarosSeepferdchen_${tagName}_${datum.replace(/\./g,'-')}.pdf`;
    pdfFensterOeffnen(tagName, datum, body, dateiname);
}

// ── Schildkröten (randomisiert) ───────────────────────────────────
(function() {
    function swimTurtle(el) {
        const ltr     = el.classList.contains('turtle-a');
        const baseRot = ltr ? -14 : 162;

        // Zufällige Start- und Endposition (15–80 vh)
        const sy  = 15 + Math.random() * 65;
        const ey  = 15 + Math.random() * 65;
        const avg = (sy + ey) / 2;

        // ~35% geschwungen, ~65% fast gerade
        let my, mr;
        if (Math.random() < 0.35) {
            const dev = 18 + Math.random() * 22;          // 18–40 vh Abweichung
            my = Math.max(8, Math.min(88, avg + (Math.random() < 0.5 ? -dev : dev)));
            // Leicht in Kurvenrichtung neigen
            mr = baseRot + (my < avg ? -7 : 7) * (ltr ? 1 : -1);
        } else {
            my = avg + (Math.random() - 0.5) * 8;          // fast gerade
            mr = baseRot;
        }

        el.style.setProperty('--t-sy', sy.toFixed(1) + 'vh');
        el.style.setProperty('--t-my', my.toFixed(1) + 'vh');
        el.style.setProperty('--t-ey', ey.toFixed(1) + 'vh');
        el.style.setProperty('--t-mr', mr.toFixed(1) + 'deg');

        // Geschwindigkeit wie vorher (A ≈ 22s, B ≈ 27s, ±2s Variation)
        const dur = ((ltr ? 22 : 27) + (Math.random() - 0.5) * 4).toFixed(1);

        // Animation neu starten
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = (ltr ? 'turtle-swim-a' : 'turtle-swim-b') + ' ' + dur + 's ease-in-out forwards';
        el.addEventListener('animationend', function() { swimTurtle(el); }, { once: true });
    }
    // A startet sofort, B versetzt
    document.querySelectorAll('.turtle-a, .turtle-b').forEach(function(el, i) {
        setTimeout(function() { swimTurtle(el); }, i === 0 ? Math.random() * 800 : 10000 + Math.random() * 4000);
    });
}());

        navigator.serviceWorker.register('./sw.js').catch(() => {});
