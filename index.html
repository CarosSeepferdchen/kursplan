<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#c2410c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Seepferdchen">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <title>Caros Seepferdchen</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Wasseranimation ─────────────────────────────────── */
        @keyframes waterGrad {
            0%, 100% { background-position: 0% 60%; }
            50%       { background-position: 100% 40%; }
        }
        @keyframes shimmerA {
            0%, 100% { opacity: .55; transform: translate(0px,   0px) scale(1);    }
            33%       { opacity: .85; transform: translate(45px, -35px) scale(1.08); }
            66%       { opacity: .40; transform: translate(-25px, 22px) scale(.95); }
        }
        @keyframes shimmerB {
            0%, 100% { opacity: .45; transform: translate(0px,   0px) scale(1);    }
            40%       { opacity: .70; transform: translate(-40px, 30px) scale(1.06); }
            75%       { opacity: .30; transform: translate(28px, -18px) scale(.97); }
        }
        @keyframes water-ripple {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes shimmerC {
            0%,100% { opacity:.75; transform:translate(0,0) scaleX(1); }
            20%      { opacity:.95; transform:translate(30px,-20px) scaleX(1.05); }
            45%      { opacity:.55; transform:translate(-18px,35px) scaleX(.97); }
            70%      { opacity:.88; transform:translate(22px,-12px) scaleX(1.03); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #bde4f5, #ddf1fb, #b3dff0, #ceeefa, #a8d8ea, #dff5fc);
            background-size: 500% 500%;
            animation: waterGrad 20s ease infinite;
            color: #1e293b;
            min-height: 100vh;
            position: relative;
            overscroll-behavior-x: none; /* verhindert horizontales Seiten-Scrollen ohne Touch-Events zu blockieren */
        }

        /* Lichtreflexe – Ebene 1 */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 44% 34% at 14% 24%, rgba(255,255,255,.82) 0%, transparent 65%),
                radial-gradient(ellipse 36% 52% at 78% 66%, rgba(255,255,255,.65) 0%, transparent 65%),
                radial-gradient(ellipse 52% 28% at 54% 8%,  rgba(255,255,255,.60) 0%, transparent 65%),
                radial-gradient(ellipse 22% 16% at 38% 50%, rgba(255,255,255,.45) 0%, transparent 60%);
            animation: shimmerA 11s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Lichtreflexe – Ebene 2, versetzt */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 32% 48% at 42% 78%, rgba(255,255,255,.62) 0%, transparent 65%),
                radial-gradient(ellipse 58% 36% at 84% 22%, rgba(255,255,255,.55) 0%, transparent 65%),
                radial-gradient(ellipse 38% 42% at 18% 88%, rgba(255,255,255,.58) 0%, transparent 65%),
                radial-gradient(ellipse 20% 14% at 62% 42%, rgba(255,255,255,.42) 0%, transparent 58%);
            animation: shimmerB 14s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Lichtreflexe – Ebene 3: scharfe Spiegelreflexe */
        .water-shimmer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 10% 6%  at 22% 35%, rgba(255,255,255,.92) 0%, rgba(255,255,255,0) 100%),
                radial-gradient(ellipse 7%  11% at 72% 20%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 100%),
                radial-gradient(ellipse 9%  5%  at 48% 68%, rgba(255,255,255,.78) 0%, rgba(255,255,255,0) 100%),
                radial-gradient(ellipse 5%  9%  at 88% 52%, rgba(255,255,255,.72) 0%, rgba(255,255,255,0) 100%),
                radial-gradient(ellipse 11% 5%  at 8%  78%, rgba(255,255,255,.68) 0%, rgba(255,255,255,0) 100%),
                radial-gradient(ellipse 6%  8%  at 58% 15%, rgba(255,255,255,.75) 0%, rgba(255,255,255,0) 100%),
                linear-gradient(125deg, transparent 25%, rgba(255,255,255,.08) 48%, transparent 72%);
            animation: shimmerC 8s ease-in-out infinite;
            mix-blend-mode: screen;
        }

        .header {
            position: relative; z-index: 10;
            background: linear-gradient(135deg, #c2410c 0%, #f97316 100%);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: 0 2px 10px rgba(194,65,12,0.35);
        }
        .header-title { font-size: 1.2rem; font-weight: 800; white-space: nowrap; display: flex; align-items: center; gap: .45rem; min-width: 0; overflow: hidden; }
        .header-actions { display: flex; gap: 0.5rem; }
        .header-btn {
            background: rgba(255,255,255,0.18);
            color: white;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(6px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 1px 4px rgba(0,0,0,0.1);
            transition: all 0.18s ease;
        }
        .header-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(255,255,255,0.48) 0%, transparent 45%),
                radial-gradient(ellipse at 80% 15%, rgba(255,255,255,0.28) 0%, transparent 35%),
                radial-gradient(ellipse at 10% 80%, rgba(255,255,255,0.12) 0%, transparent 28%),
                radial-gradient(ellipse at 85% 80%, rgba(255,255,255,0.09) 0%, transparent 24%);
            pointer-events: none;
        }
        .header-btn:hover {
            background: rgba(255,255,255,0.28);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 3px 10px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }
        .header-btn:active { transform: scale(0.96) translateY(1px); }

        .nav {
            position: relative; z-index: 10;
            background: white;
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            padding: 0 1.5rem;
        }
        .nav-tab {
            padding: 0.85rem 1.2rem;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #64748b;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            transition: color 0.18s ease, background 0.18s ease;
        }
        .nav-tab:hover {
            color: #c2410c;
            background: linear-gradient(to top, rgba(249,115,22,0.07), transparent);
        }
        .nav-tab.active {
            color: #c2410c;
            border-bottom-color: #c2410c;
            font-weight: 700;
            background: linear-gradient(to top, rgba(249,115,22,0.09), transparent);
        }

        .main { padding: 1.25rem; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.6rem 1.1rem;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            line-height: 1;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 18% 18%, rgba(255,255,255,0.52) 0%, transparent 48%),
                radial-gradient(ellipse at 82% 12%, rgba(255,255,255,0.30) 0%, transparent 36%),
                radial-gradient(ellipse at 8%  82%, rgba(255,255,255,0.13) 0%, transparent 28%),
                radial-gradient(ellipse at 88% 82%, rgba(255,255,255,0.10) 0%, transparent 24%),
                linear-gradient(160deg, rgba(255,255,255,0.12) 0%, transparent 55%);
            border-radius: inherit;
            pointer-events: none;
        }
        .btn:hover  { transform: translateY(-1px); }
        .btn:active { transform: scale(0.96) translateY(1px) !important; }
        .btn-primary {
            background: linear-gradient(150deg, #fb923c 0%, #f97316 55%, #ea6c0a 100%);
            color: white;
            box-shadow: 0 3px 12px rgba(249,115,22,0.38), inset 0 1px 0 rgba(255,255,255,0.18);
        }
        .btn-primary:hover { box-shadow: 0 6px 18px rgba(249,115,22,0.5), inset 0 1px 0 rgba(255,255,255,0.22); }
        .btn-danger {
            background: linear-gradient(150deg, #f87171 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(220,38,38,0.32), inset 0 1px 0 rgba(255,255,255,0.16);
        }
        .btn-danger:hover { box-shadow: 0 6px 16px rgba(220,38,38,0.44), inset 0 1px 0 rgba(255,255,255,0.2); }
        .btn-secondary {
            background: linear-gradient(150deg, #f0f9ff 0%, #dbeafe 100%);
            color: #1d4ed8;
            box-shadow: 0 2px 8px rgba(29,78,216,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
            border: 1px solid rgba(147,197,253,0.6);
        }
        .btn-secondary:hover {
            background: linear-gradient(150deg, #dbeafe 0%, #bfdbfe 100%);
            box-shadow: 0 4px 14px rgba(29,78,216,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
        }
        .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; }
        .water-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transform: scale(0);
            animation: water-ripple 0.65s linear forwards;
            pointer-events: none;
        }

        .search-input {
            padding: 0.6rem 0.9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: 0.88rem;
            font-family: inherit;
            background: white;
            flex: 1;
            min-width: 140px;
            max-width: 260px;
        }
        .search-input:focus { outline: none; border-color: #f97316; }

        .chips-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .chip {
            padding: 0.4rem 0.85rem;
            border-radius: 99px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            background: linear-gradient(150deg, #f8fafc 0%, #f1f5f9 100%);
            color: #64748b;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.95);
            transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
        }
        .chip::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 22%, rgba(255,255,255,0.55) 0%, transparent 42%),
                radial-gradient(circle at 78% 18%, rgba(255,255,255,0.28) 0%, transparent 32%),
                radial-gradient(circle at 12% 78%, rgba(255,255,255,0.10) 0%, transparent 25%),
                radial-gradient(circle at 85% 80%, rgba(255,255,255,0.08) 0%, transparent 22%);
            border-radius: inherit;
            pointer-events: none;
        }
        .chip:hover {
            border-color: #93c5fd;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.95);
            transform: translateY(-1px);
        }
        .chip:active { transform: scale(0.95) !important; }
        .chip.chip-active {
            color: white;
            border-color: transparent;
            background: linear-gradient(150deg, #fb923c 0%, #f97316 100%);
            box-shadow: 0 3px 10px rgba(249,115,22,0.38), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .chip-today-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #f59e0b;
            margin-left: 4px;
            vertical-align: middle;
        }
        .chip.chip-active .chip-today-dot { background: #fde68a; }

        /* ── Kurs-Karten ── */
        .kurs-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            margin-bottom: 1rem;
            overflow: hidden;
            border-left: 6px solid #f97316;
        }
        .kurs-card.ohne-kurs { border-left-color: #cbd5e1; }
        .kurs-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.95rem 1.1rem;
            background: #f8fafc;
            border-bottom: 1px solid #eef2f7;
            flex-wrap: wrap;
        }
        .kurs-head-left { min-width: 0; }
        .kurs-title { font-weight: 800; font-size: 1.02rem; }
        .kurs-sub {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .kurs-time-badge {
            background: #fff7ed;
            color: #9a3412;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 99px;
            font-size: 0.74rem;
        }
        .kurs-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
        .icon-btn {
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            width: 34px; height: 34px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { background: #f1f5f9; }

        .kurs-kinder { padding: 0.5rem; }
        .kurs-empty {
            text-align: center;
            color: #94a3b8;
            font-size: 0.84rem;
            padding: 1.1rem 0.5rem;
        }

        /* ── Kind-Zeile ── */
        .kind-block { border-radius: 10px; }
        .kind-block.expanded { background: #f8fafc; box-shadow: inset 0 0 0 1.5px #e2e8f0; }
        .kind-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.65rem;
            border-radius: 10px;
            cursor: pointer;
        }
        .kind-row:hover { background: #f1f5f9; }
        .kind-block.expanded .kind-row:hover { background: transparent; }
        .kind-caret {
            color: #94a3b8;
            font-size: 0.7rem;
            width: 14px;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .kind-block.expanded .kind-caret { transform: rotate(90deg); color: #f97316; }
        .kind-row-main { flex: 1; min-width: 0; }
        .kind-row-name {
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .kind-row-sub {
            font-size: 0.74rem;
            color: #64748b;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .kind-summary { display: flex; align-items: center; gap: 0.45rem; flex-shrink: 0; }
        .kind-sum-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
        .kind-sum-stufe { font-size: 0.74rem; font-weight: 700; color: #475569; }
        .mini-bar {
            width: 56px; height: 6px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
        }
        .mini-bar > div { height: 100%; border-radius: 99px; transition: width 0.3s; }
        .kind-sum-count { font-size: 0.74rem; color: #64748b; min-width: 26px; }
        .kind-row-x {
            background: none;
            border: none;
            color: #cbd5e1;
            font-size: 1.3rem;
            line-height: 1;
            cursor: pointer;
            width: 28px; height: 28px;
            border-radius: 7px;
            flex-shrink: 0;
        }
        .kind-row-x:hover { background: #fee2e2; color: #dc2626; }

        /* ── Logbuch ── */
        .logbook { padding: 0 0.65rem 0.75rem; }
        .logbook-tabs {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin-bottom: 0.7rem;
        }
        .logbook-tab {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            border-radius: 9px;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #64748b;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            line-height: 1;
        }
        .logbook-tab:hover { border-color: #94a3b8; }
        .logbook-tab.active { color: white; border-color: transparent; }
        .lb-ind {
            font-size: 0.66rem;
            font-weight: 700;
            padding: 0.05rem 0.32rem;
            border-radius: 99px;
            background: #f1f5f9;
            color: #64748b;
        }
        .logbook-tab.active .lb-ind { background: rgba(255,255,255,0.28); color: white; }
        .lb-ind.lb-complete { background: #16a34a; color: white; }
        .logbook-tab.active .lb-ind.lb-complete { background: rgba(255,255,255,0.35); }

        .lb-page-title {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }
        .lb-page-num {
            font-size: 0.7rem;
            font-weight: 700;
            color: #94a3b8;
        }
        .lb-task {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.75rem;
            background: white;
            border: 1px solid #eef2f7;
            border-radius: 9px;
            margin-bottom: 0.35rem;
        }
        .lb-task:hover { border-color: #cbd5e1; }
        .lb-task.lb-done { background: #f0fdf4; border-color: #bbf7d0; }
        .lb-task-text {
            flex: 1;
            font-size: 0.86rem;
            color: #374151;
            line-height: 1.4;
            cursor: pointer;
        }
        .lb-task.lb-done .lb-task-text { text-decoration: line-through; color: #94a3b8; }
        .lb-note {
            flex: 0 0 90px;
            padding: 0.25rem 0.45rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 7px;
            font-size: 0.76rem;
            font-family: inherit;
            color: #475569;
            background: #f8fafc;
            min-width: 0;
        }
        .lb-note:focus { outline: none; border-color: #f97316; background: white; }
        .lb-note::placeholder { color: #cbd5e1; }
        .lb-cb { width: 22px; height: 22px; min-width: 22px; cursor: pointer; accent-color: #16a34a; flex-shrink: 0; }
        .lb-anmerkung {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: inherit;
            color: #374151;
            background: #fffbeb;
            resize: vertical;
            min-height: 52px;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }
        .lb-anmerkung:focus { outline: none; border-color: #f59e0b; background: white; }
        .lb-anmerkung::placeholder { color: #d1d5db; }
        .lb-leer {
            font-size: 0.82rem;
            color: #94a3b8;
            text-align: center;
            padding: 1rem 0.5rem;
            line-height: 1.5;
        }
        /* kleines Kästchen zum Anklicken — erscheint bei abgehakten Aufgaben */
        .lb-datum-trigger {
            display: block;
            width: 14px; height: 14px;
            border: 1.5px solid #bbf7d0;
            border-radius: 3px;
            background: #f0fdf4;
            cursor: pointer;
            margin-top: 0.25rem;
            flex-shrink: 0;
        }
        .lb-datum-trigger:hover { background: #dcfce7; border-color: #16a34a; }
        /* gesetztes Datum als klickbarer Text */
        .lb-datum {
            display: block;
            font-size: 0.67rem;
            font-weight: 600;
            color: #16a34a;
            margin-top: 0.2rem;
            text-decoration: none;
            cursor: pointer;
        }
        .lb-datum:hover { text-decoration: underline; }
        /* Eingabefeld das per JS eingeblendet wird */
        .lb-datum-input {
            display: block;
            margin-top: 0.2rem;
            width: 128px;
            padding: 0.15rem 0.35rem;
            border: 1.5px solid #bbf7d0;
            border-radius: 6px;
            font-size: 0.72rem;
            font-family: inherit;
            color: #16a34a;
            background: #f0fdf4;
            cursor: pointer;
        }
        .lb-datum-input:focus { outline: none; border-color: #16a34a; }
        .lb-abz-datum-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 700;
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            margin-bottom: 0.55rem;
        }
        .lb-abz-datum-trigger {
            display: inline-block;
            width: 14px; height: 14px;
            border: 1.5px solid #bbf7d0;
            border-radius: 3px;
            background: #f0fdf4;
            cursor: pointer;
            vertical-align: middle;
        }
        .lb-abz-datum-trigger:hover { background: #dcfce7; border-color: #16a34a; }
        .lb-abz-datum-val { cursor: pointer; text-decoration: none; color: #166534; }
        .lb-abz-datum-val:hover { text-decoration: underline; }
        .lb-abz-datum-input {
            border: none; background: transparent;
            font-size: 0.72rem; font-weight: 700;
            color: #166534; cursor: pointer;
            font-family: inherit; padding: 0;
        }
        .logbook-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.7rem;
            padding-top: 0.6rem;
            border-top: 1px solid #eef2f7;
        }

        .empty-state { text-align: center; padding: 3rem 1rem; }
        .empty-state h3 { font-size: 1.05rem; color: #64748b; margin-bottom: 0.4rem; }
        .empty-state p  { font-size: 0.88rem; color: #94a3b8; }

        /* ── Modals ── */
        .modal-bg {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(2px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-bg.open { display: flex; }
        .modal-box {
            background: white;
            border-radius: 18px;
            width: 100%;
            max-width: 460px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }
        .modal-title { font-size: 1.1rem; font-weight: 800; }
        .modal-close {
            background: #f1f5f9; border: none; border-radius: 8px;
            width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; flex-shrink: 0;
        }
        .modal-close:hover { background: #e2e8f0; }

        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: 0.92rem;
            font-family: inherit;
            background: white;
        }
        .form-input:focus, .form-select:focus { outline: none; border-color: #f97316; }
        .form-row { display: flex; gap: 0.75rem; }
        .form-row .form-group { flex: 1; }

        .badge-card {
            background: white;
            border-radius: 12px;
            padding: 1.1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            margin-bottom: 0.75rem;
            border-left: 5px solid #e2e8f0;
        }
        .badge-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.5rem; gap: 0.5rem; flex-wrap: wrap;
        }
        .badge-card-title { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge-page-num {
            background: #f1f5f9; color: #64748b;
            font-size: 0.7rem; font-weight: 800;
            width: 22px; height: 22px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .badge-card-meta { font-size: 0.78rem; color: #94a3b8; margin-bottom: 0.6rem; }
        .badge-req-row {
            display: flex; align-items: flex-start; gap: 0.5rem;
            font-size: 0.83rem; color: #475569; padding: 0.2rem 0;
        }
        .badge-req-row::before { content: "▸"; color: #94a3b8; flex-shrink: 0; }
        .badge-req-leer { font-size: 0.82rem; color: #cbd5e1; font-style: italic; }

        .anf-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; }
        .anf-input {
            flex: 1;
            padding: 0.55rem 0.75rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-size: 0.88rem;
            font-family: inherit;
        }
        .anf-input:focus { outline: none; border-color: #f97316; }
        .anf-del {
            background: #fee2e2; border: none; border-radius: 8px;
            width: 34px; cursor: pointer; color: #dc2626; font-size: 1.1rem;
        }

        /* Entweder/Oder-Gruppe im Logbuch */
        .lb-eo-group {
            border: 1.5px solid #ddd6fe;
            border-radius: 11px;
            overflow: hidden;
            margin-bottom: 0.35rem;
            background: #faf5ff;
        }
        .lb-eo-group .lb-task {
            background: transparent;
            border: none;
            border-radius: 0;
            margin-bottom: 0;
        }
        .lb-eo-group .lb-task:hover { background: rgba(124,58,237,0.05); }
        .lb-eo-group .lb-task.lb-done { background: #f0fdf4; }
        .lb-eo-divider {
            text-align: center;
            font-size: 0.68rem;
            font-weight: 800;
            color: #7c3aed;
            background: #ede9fe;
            padding: 0.18rem;
            letter-spacing: 0.08em;
        }

        /* Abschnittsblasen */
        .abschnitt-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            padding: 0.7rem 0.85rem;
            border-bottom: 1px solid #eef2f7;
            background: rgba(255,255,255,0.5);
            align-items: center;
        }
        .abschnitt-bubble {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            background: white;
            font-size: 0.82rem; font-weight: 700;
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            color: #64748b; font-family: inherit;
            transition: transform 0.12s, border-color 0.12s;
            flex-shrink: 0;
        }
        .abschnitt-bubble:hover { border-color: #94a3b8; color: #374151; transform: scale(1.1); }
        .abschnitt-bubble.aktiv { color: white; border-color: transparent; }
        .abschnitt-add {
            border-style: dashed;
            border-color: #cbd5e1;
            color: #94a3b8;
            font-size: 1.2rem; font-weight: 400;
        }
        .abschnitt-add:hover { border-color: #64748b; color: #374151; transform: scale(1.1); }
        .abschnitt-content-title {
            font-size: 0.75rem; font-weight: 700;
            color: #475569; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.5rem;
        }

        /* Anwesenheitsliste */
        .attendance-section {
            border-top: 1px solid #eef2f7;
            margin-top: 0.8rem; padding-top: 0.75rem;
        }
        .attendance-title {
            font-size: 0.75rem; font-weight: 700;
            color: #475569; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 0.45rem;
        }
        .attendance-row {
            display: flex; align-items: center;
            gap: 0.6rem; padding: 0.3rem 0.4rem;
            border-radius: 7px; cursor: pointer;
        }
        .attendance-row:hover { background: #f8fafc; }
        .attendance-cb { width: 17px; height: 17px; accent-color: #16a34a; cursor: pointer; flex-shrink: 0; }
        .attendance-name { font-size: 0.85rem; color: #374151; }
        .attendance-empty { font-size: 0.8rem; color: #94a3b8; font-style: italic; padding: 0.2rem 0.4rem; }
        .attendance-summary {
            font-size: 0.72rem; color: #64748b;
            margin-top: 0.35rem; padding: 0 0.4rem;
        }

        /* Dateibereich */
        .dateien-section {
            border-top: 1px solid #eef2f7;
            margin-top: 0.8rem;
            padding-top: 0.75rem;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            padding: 1rem 1rem;
            text-align: center;
            color: #94a3b8;
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: #f8fafc;
            margin-bottom: 0.5rem;
        }
        .drop-zone.dragover, .drop-zone:hover {
            border-color: #7dd3fc;
            background: #f0f9ff;
            color: #0369a1;
        }
        .datei-row {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.35rem 0.3rem; border-radius: 7px;
            font-size: 0.82rem;
        }
        .datei-row:hover { background: #f8fafc; }
        .datei-ext {
            font-size: 0.64rem; font-weight: 800; text-transform: uppercase;
            background: #e2e8f0; color: #475569;
            padding: 0.1rem 0.35rem; border-radius: 4px;
            flex-shrink: 0; min-width: 30px; text-align: center;
        }
        .datei-name {
            flex: 1; color: #374151; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .datei-name:hover { text-decoration: underline; color: #0369a1; }
        .datei-size { color: #94a3b8; font-size: 0.7rem; flex-shrink: 0; }
        .datei-del {
            background: none; border: none; color: #cbd5e1;
            cursor: pointer; font-size: 1.1rem; line-height: 1;
            padding: 0 0.2rem; flex-shrink: 0;
        }
        .datei-del:hover { color: #dc2626; }

        .training-textarea {
            width: 100%;
            min-height: 180px;
            padding: 0.8rem 0.9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: inherit;
            color: #374151;
            background: white;
            resize: vertical;
            line-height: 1.7;
        }
        .training-textarea:focus { outline: none; border-color: #0ea5e9; }
        .training-textarea::placeholder { color: #d1d5db; }
        .training-saved {
            font-size: 0.72rem;
            color: #16a34a;
            margin-top: 0.3rem;
            height: 1em;
            transition: opacity 0.5s;
        }

        @media (max-width: 500px) {
            /* ── Header kompakter ─────────────────────────────── */
            .header { padding: 0.6rem 0.85rem; gap: 0.5rem; }
            .header-title { font-size: 0.95rem; }
            .header-title img { height: 1.6rem; width: 1.6rem; }

            /* Buttons: nur Icon + kurzes Label, kein Zeilenumbruch */
            .header-btn { padding: 0.3rem 0.55rem; font-size: 0.72rem; white-space: nowrap; }
            /* "Drucken / PDF" auf Mobil ausblenden — weniger wichtig */
            .header-btn-pdf { display: none; }

            /* ── Haupt-Layout ─────────────────────────────────── */
            .main { padding: 0.85rem; }
            .form-row { flex-direction: column; gap: 0; }

            /* ── Kurs-Karte ───────────────────────────────────── */
            .kind-sum-stufe { display: none; }
            .mini-bar { width: 44px; }
            .kurs-card { padding: 0.85rem; }

            /* ── Logbuch-Aufgaben ─────────────────────────────── */
            /* Notizfeld auf Mobil kleiner */
            .lb-note { flex: 0 0 65px; font-size: 0.75rem; padding: 0.2rem 0.3rem; }
            .lb-task { padding: 0.55rem 0.6rem; gap: 0.4rem; }
            .lb-task-text { font-size: 0.83rem; }

            /* ── Toolbar ──────────────────────────────────────── */
            .toolbar { gap: 0.5rem; }
        }

        @keyframes cloudPulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Schildkröten-Schatten ─────────────────────────────── */
        @keyframes turtle-swim-a {
            0%          { transform: translate(-220px, var(--t-sy, 55vh)) rotate(-14deg); opacity: 0; }
            6%          { opacity: 0; }
            10%         { opacity: 1; }
            90%         { opacity: 1; }
            94%         { opacity: 0; }
            100%        { transform: translate(calc(100vw + 220px), var(--t-ey, 32vh)) rotate(-14deg); opacity: 0; }
        }
        @keyframes turtle-swim-b {
            0%          { transform: translate(calc(100vw + 220px), var(--t-sy, 48vh)) rotate(162deg); opacity: 0; }
            6%          { opacity: 0; }
            10%         { opacity: 1; }
            90%         { opacity: 1; }
            94%         { opacity: 0; }
            100%        { transform: translate(-220px, var(--t-ey, 70vh)) rotate(162deg); opacity: 0; }
        }
        @keyframes turtle-flap {
            0%, 100%    { transform: scaleY(1) rotate(0deg); }
            25%         { transform: scaleY(0.93) rotate(-0.4deg); }
            75%         { transform: scaleY(1.04) rotate(0.4deg); }
        }
        .turtle-layer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .turtle {
            position: absolute;
            top: 0; left: 0;
            width: 200px; height: 180px;
            color: rgba(12, 38, 98, 0.13);
            filter: blur(1.5px);
        }
        .turtle svg {
            width: 100%; height: 100%;
            animation: turtle-flap 2.2s ease-in-out infinite;
        }
        /* .turtle-a / .turtle-b werden per JS animiert (randomisiert) */

        /* ── Sicherung ────────────────────────────────────────── */
        .backup-warn-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #ef4444; margin-left: 4px; vertical-align: top;
            animation: cloudPulse 1.2s infinite;
        }
        .backup-toast {
            position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
            background: #fff7ed; border: 1px solid #fdba74; color: #9a3412;
            border-radius: 12px; padding: .8rem 1rem; box-shadow: 0 8px 28px rgba(0,0,0,.16);
            display: none; align-items: center; gap: .8rem; z-index: 2000;
            font-size: .9rem; max-width: 92vw;
        }
        .backup-toast.show { display: flex; }
        .backup-toast button { font-family: inherit; cursor: pointer; }
        .backup-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: .6rem; padding: .55rem .2rem; border-bottom: 1px solid #f1f5f9;
        }

    </style>
</head>
<body>
<div class="water-shimmer" aria-hidden="true"></div>
<div class="turtle-layer" aria-hidden="true">
    <div class="turtle turtle-a"><svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <!-- Hintere Flossen (klein, schräg nach hinten) -->
        <path d="M 72,62 C 66,46 54,33 42,30 C 38,34 44,44 54,49 C 64,53 72,58 76,68 Z"/>
        <path d="M 72,118 C 66,134 54,147 42,150 C 38,146 44,136 54,131 C 64,127 72,122 76,112 Z"/>
        <!-- Vordere Flossen (lang, schmal, Paddel-Form, oben + unten) -->
        <path d="M 107,56 C 104,38 108,18 116,6 C 122,4 128,8 128,18 C 126,32 122,48 120,60 Z"/>
        <path d="M 107,124 C 104,142 108,162 116,174 C 122,176 128,172 128,162 C 126,148 122,132 120,120 Z"/>
        <!-- Panzer (rund) -->
        <ellipse cx="100" cy="90" rx="44" ry="40"/>
        <!-- Schwanz -->
        <path d="M 56,86 C 48,83 42,88 42,88 C 42,88 48,93 56,91 Z"/>
        <!-- Hals + Kopf -->
        <path d="M 143,82 C 152,79 163,83 168,90 C 163,97 152,101 143,98 Z"/>
        <ellipse cx="178" cy="90" rx="15" ry="12"/>
    </svg></div>
    <div class="turtle turtle-b"><svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M 72,62 C 66,46 54,33 42,30 C 38,34 44,44 54,49 C 64,53 72,58 76,68 Z"/>
        <path d="M 72,118 C 66,134 54,147 42,150 C 38,146 44,136 54,131 C 64,127 72,122 76,112 Z"/>
        <path d="M 107,56 C 104,38 108,18 116,6 C 122,4 128,8 128,18 C 126,32 122,48 120,60 Z"/>
        <path d="M 107,124 C 104,142 108,162 116,174 C 122,176 128,172 128,162 C 126,148 122,132 120,120 Z"/>
        <ellipse cx="100" cy="90" rx="44" ry="40"/>
        <path d="M 56,86 C 48,83 42,88 42,88 C 42,88 48,93 56,91 Z"/>
        <path d="M 143,82 C 152,79 163,83 168,90 C 163,97 152,101 143,98 Z"/>
        <ellipse cx="178" cy="90" rx="15" ry="12"/>
    </svg></div>
</div>

<header class="header">
    <div class="header-title"><img src="/icon-192.png" style="height:1.9rem;width:1.9rem;border-radius:50%;flex-shrink:0;object-fit:cover"> Caros Seepferdchen</div>
    <div class="header-actions">
        <button class="header-btn" id="backup-btn" onclick="openBackupModal()" title="Daten sichern">🛟 Sicherung<span class="backup-warn-dot" id="backup-warn-dot" style="display:none"></span></button>
        <button class="header-btn header-btn-pdf" onclick="teilen()">↗ Drucken / PDF</button>
    </div>
</header>

<nav class="nav">
    <button class="nav-tab active" onclick="showTab('kurse')">Kurse</button>
    <button class="nav-tab" onclick="showTab('training')">Training</button>
    <button class="nav-tab" onclick="showTab('abzeichen')">Abzeichen</button>
</nav>

<div class="main">
    <div id="tab-kurse">
        <div class="toolbar">
            <button class="btn btn-primary trainer-only" onclick="openAddKurs()">+ Kurs anlegen</button>
            <input class="search-input" type="search" id="search-input" placeholder="Kind suchen…" oninput="renderKurse()">
        </div>
        <div class="chips-row" id="day-chips"></div>
        <div id="kurse-list"></div>
    </div>

    <div id="tab-training" hidden>
        <div id="training-list"></div>
    </div>

    <div id="tab-abzeichen" hidden>
        <div id="badges-list" style="padding:.5rem 0"></div>
    </div>
</div>

<!-- Kurs hinzufügen / bearbeiten -->
<div class="modal-bg" id="modal-kurs">
    <div class="modal-box">
        <div class="modal-header">
            <h2 class="modal-title" id="modal-kurs-title">Kurs anlegen</h2>
            <button class="modal-close" onclick="closeModal('modal-kurs')">×</button>
        </div>
        <div class="form-group">
            <label class="form-label">Kursname *</label>
            <input class="form-input" type="text" id="kurs-name" placeholder="z.B. Anfänger / Gruppe 1"
                onkeydown="if(event.key==='Enter')saveKurs()">
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label class="form-label">Wochentag</label>
                <select class="form-select" id="kurs-tag"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Jahrgang</label>
                <input class="form-input" type="number" id="kurs-jahrgang" placeholder="z.B. 2016" min="2000" max="2030">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Von (Uhrzeit)</label>
                <input class="form-input" type="time" id="kurs-von">
            </div>
            <div class="form-group">
                <label class="form-label">Bis</label>
                <input class="form-input" type="time" id="kurs-bis">
            </div>
        </div>
        <div class="modal-footer" style="display:flex;gap:0.6rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f1f5f9">
            <button class="btn btn-primary" onclick="saveKurs()" style="flex:1">Speichern</button>
            <button class="btn btn-secondary" onclick="closeModal('modal-kurs')">Abbrechen</button>
        </div>
    </div>
</div>

<!-- Kind hinzufügen / bearbeiten -->
<div class="modal-bg" id="modal-kind">
    <div class="modal-box">
        <div class="modal-header">
            <h2 class="modal-title" id="modal-kind-title">Kind hinzufügen</h2>
            <button class="modal-close" onclick="closeModal('modal-kind')">×</button>
        </div>
        <div class="form-group">
            <label class="form-label">Name *</label>
            <input class="form-input" type="text" id="kind-name" placeholder="Vorname Nachname"
                onkeydown="if(event.key==='Enter')saveKind()">
        </div>
        <div class="form-group">
            <label class="form-label">Kurs</label>
            <select class="form-select" id="kind-kurs"></select>
        </div>
        <div class="modal-footer" style="display:flex;gap:0.6rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f1f5f9">
            <button class="btn btn-primary" onclick="saveKind()" style="flex:1">Speichern</button>
            <button class="btn btn-secondary" onclick="closeModal('modal-kind')">Abbrechen</button>
        </div>
    </div>
</div>

<!-- Stufe (Abzeichen) bearbeiten -->
<div class="modal-bg" id="modal-badge">
    <div class="modal-box">
        <div class="modal-header">
            <h2 class="modal-title" id="modal-badge-title">Stufe bearbeiten</h2>
            <button class="modal-close" onclick="closeModal('modal-badge')">×</button>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label class="form-label">Name</label>
                <input class="form-input" type="text" id="badge-name" placeholder="Name der Stufe">
            </div>
            <div class="form-group">
                <label class="form-label">Farbe</label>
                <input type="color" id="badge-color" value="#3b82f6"
                    style="width:100%;height:44px;padding:3px;border:1.5px solid #e2e8f0;border-radius:9px;cursor:pointer">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Aufgaben</label>
            <div id="anf-builder"></div>
            <button class="btn btn-secondary btn-sm" onclick="addAnfRow()" style="margin-top:0.4rem">+ Aufgabe</button>
        </div>
        <div class="modal-footer" style="display:flex;gap:0.6rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f1f5f9">
            <button class="btn btn-primary" onclick="saveStufe()" style="flex:1">Speichern</button>
            <button class="btn btn-secondary" onclick="closeModal('modal-badge')">Abbrechen</button>
        </div>
    </div>
</div>

<!-- Sicherung -->
<div class="modal-bg" id="modal-backup">
    <div class="modal-box" style="max-width:460px">
        <div class="modal-header">
            <h2 class="modal-title">🛟 Datensicherung</h2>
            <button class="modal-close" onclick="closeModal('modal-backup')">×</button>
        </div>
        <div id="backup-status" style="font-size:.85rem;font-weight:600;margin-bottom:.4rem"></div>

<script>
const STORAGE_KEY = 'schwimmtrainer_v1';
const BACKUP_KEY = 'schwimmtrainer_backups';      // automatische Schutz-Historie
const LASTEXPORT_KEY = 'schwimmtrainer_lastexport'; // Zeitpunkt der letzten Datei-Sicherung

const WOCHENTAGE = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const WOCHENTAGE_KURZ = ['Mo','Di','Mi','Do','Fr','Sa','So'];

const trainerMode = true;   // lokal: immer voller Zugriff

// Farbpalette für Kurskarten — Zuweisung nach Reihenfolge in state.kurse

// Festes 6-Stufen-Logbuch. Aufgaben sind Platzhalter – Tom liefert die echten Punkte.
const STUFEN_DEFAULT = [

let state = { kinder: [], badges: [], kurse: [], wochenplaene: {}, anwesenheit: {} };

// ── Storage ──────────────────────────────────────────────────────

// Versionsnummer hochzählen wenn STUFEN_DEFAULT geändert wird → zwingt alle Browser zum Aktualisieren
const STUFEN_VERSION = 5;

function ensureStufen() {
    if (!Array.isArray(state.badges)) state.badges = [];
    const brauchtUpdate = state.stufenVersion !== STUFEN_VERSION;
    state.badges = STUFEN_DEFAULT.map(def => {
        const ex = state.badges.find(b => b.id === def.id);
        if (!ex) return JSON.parse(JSON.stringify(def));   // neu → komplett aus Default
        return {
            id: def.id,
            name: ex.name || def.name,
            // Bei Update: Farbe immer aus Default übernehmen (z.B. nach Farbänderung)
            // Ohne Update: gespeicherte Farbe behalten (falls Nutzer sie individuell geändert hat)
            farbe: brauchtUpdate ? def.farbe : (ex.farbe || def.farbe),
            anforderungen: Array.isArray(ex.anforderungen) && ex.anforderungen.length
                ? ex.anforderungen
                : def.anforderungen
        };
    });
    state.stufenVersion = STUFEN_VERSION;
}

function normalizeState(s) {
    if (!s.kurse)        s.kurse = [];
    if (!s.kinder)       s.kinder = [];
    if (!s.wochenplaene) s.wochenplaene = {};
    if (!s.anwesenheit)  s.anwesenheit = {};
    if (!s.abschnittCount) s.abschnittCount = {};
    if (!s.dateien)      s.dateien = {};
    s.kinder.forEach(k => { if (k.kursId === undefined) k.kursId = null; });
    return s;
}

function load() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        state = raw ? normalizeState(JSON.parse(raw))
                    : { kinder: [], badges: [], kurse: [], wochenplaene: {}, anwesenheit: {}, abschnittCount: {}, dateien: {} };
    } catch(e) {
        state = { kinder: [], badges: [], kurse: [], wochenplaene: {}, anwesenheit: {}, abschnittCount: {}, dateien: {} };
    }
    ensureStufen();
}

function save() {
    state._savedAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    pushBackup();
}

function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'schwimmtrainer_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    localStorage.setItem(LASTEXPORT_KEY, String(Date.now()));
    updateBackupWarnDot();
    if (document.getElementById('modal-backup')?.classList.contains('open')) renderBackupList();
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const imp = JSON.parse(e.target.result);
            if (!imp.kinder) throw new Error();
            pushBackup();               // aktuellen Stand vorher sichern
            state = normalizeState(imp);
            ensureStufen();
            save(); renderKurse();
            if (document.getElementById('modal-backup')?.classList.contains('open')) renderBackupList();
            alert('Daten erfolgreich geladen!');
        } catch(e) { alert('Fehler beim Laden. Bitte prüfe die Datei.'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ── Automatische Schutz-Historie ──────────────────────────────────
function pushBackup() {
    try {
        const snapshot = JSON.stringify({ ...state, dateien: {} });  // Bilder/Dateien nicht mitspeichern (Platz)
        const sig = (state.kinder?.length || 0) + '/' + (state.kurse?.length || 0) + '/' + (state.badges?.length || 0);
        let list = [];
        try { list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); } catch(e) { list = []; }
        const now = Date.now();
        const last = list[0];
        if (last && last.data === snapshot) return;                  // nichts geändert
        const entry = { id: now + '-' + Math.random().toString(36).slice(2, 8), ts: now, data: snapshot, sig };
        // Nur reine Kleinänderungen (gleiche Anzahl Kinder/Kurse/Stufen) innerhalb 30 Min zusammenfassen.
        // Hinzufügen/Löschen ändert die Anzahl → immer eigener Wiederherstellungspunkt.
        if (last && last.sig === sig && (now - last.ts) < 30 * 60 * 1000) list[0] = entry;
        else list.unshift(entry);
        if (list.length > 30) list = list.slice(0, 30);
        // Bei vollem Speicher: älteste Sicherungen verwerfen und erneut versuchen
        for (let tries = 0; tries < 25; tries++) {
            try { localStorage.setItem(BACKUP_KEY, JSON.stringify(list)); return; }
            catch(e) { if (list.length <= 3) return; list.pop(); }
        }
    } catch(e) { /* App läuft normal weiter */ }
}

function restoreBackup(id) {
    let list = [];
    try { list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); } catch(e) { return; }
    const entry = list.find(e => e.id === id);
    if (!entry) return;
    if (!confirm('Diesen früheren Stand wiederherstellen?\n\nDer aktuelle Stand wird vorher automatisch gesichert, du kannst also zurück.')) return;
    pushBackup();
    try {
        const restored = JSON.parse(entry.data);
        const dateien = state.dateien || {};
        state = normalizeState(restored);
        state.dateien = dateien;                  // vorhandene Dateien behalten
        ensureStufen();
        expandedKindId = null;
        save(); renderKurse(); renderBackupList();
        alert('Stand wiederhergestellt ✓');
    } catch(e) { alert('Wiederherstellen fehlgeschlagen.'); }
}

function openBackupModal() { renderBackupList(); openModal('modal-backup'); }

function renderBackupList() {
    const statusEl = document.getElementById('backup-status');
    if (statusEl) {
        const le = localStorage.getItem(LASTEXPORT_KEY);
        if (le) {
            const days = Math.floor((Date.now() - Number(le)) / 86400000);
            const txt = days <= 0 ? 'heute' : (days === 1 ? 'gestern' : 'vor ' + days + ' Tagen');
            const warn = days >= 7;
            statusEl.innerHTML = 'Letzte Sicherungsdatei: ' + txt + (warn ? ' ⚠️ — bitte wieder speichern!' : ' ✓');
            statusEl.style.color = warn ? '#c2410c' : '#16a34a';
        } else {
            statusEl.innerHTML = '⚠️ Noch keine Sicherungsdatei gespeichert — bitte einmal „Sicherung speichern".';
            statusEl.style.color = '#c2410c';
        }
    }
    const cloudEl = document.getElementById('backup-cloud-status');
    if (cloudEl) {
        const ls = localStorage.getItem(SERVER_BACKUP_KEY);
        if (ls) {
            const d = new Date(Number(ls));
            const heute = d.toLocaleDateString('de-DE') === new Date().toLocaleDateString('de-DE');
            const wann = heute ? 'heute ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
                               : d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
            cloudEl.innerHTML = '☁️ Automatisch in Dropbox gesichert: ' + wann + ' ✓';
        } else {
            cloudEl.innerHTML = '☁️ Automatische Dropbox-Sicherung aktiv (sichert beim nächsten Ändern).';
        }
    }
    const wrap = document.getElementById('backup-list');
    if (!wrap) return;
    let list = [];
    try { list = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]'); } catch(e) {}
    if (!list.length) {
        wrap.innerHTML = '<div style="color:#94a3b8;font-size:.85rem;padding:.5rem 0">Noch keine automatischen Sicherungen vorhanden.</div>';
        return;
    }
    wrap.innerHTML = list.map(e => {
        const d = new Date(e.ts);
        const datum = d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' }) + ' ' +
                      d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
        let info = '';
        try { const s = JSON.parse(e.data); info = (s.kinder?.length || 0) + ' Kinder · ' + (s.kurse?.length || 0) + ' Kurse'; } catch(x) {}
        return '<div class="backup-row">' +
                 '<div><div style="font-weight:600;font-size:.88rem">' + datum + '</div>' +
                 '<div style="font-size:.72rem;color:#94a3b8">' + info + '</div></div>' +
                 '<button class="btn btn-secondary btn-sm" onclick="restoreBackup(\'' + e.id + '\')">Wiederherstellen</button>' +
               '</div>';
    }).join('');
}

function backupOverdue() {
    const le = localStorage.getItem(LASTEXPORT_KEY);
    return !le || (Date.now() - Number(le)) > 7 * 86400000;
}
function hasEchteData() {
    // Nur echte Daten zählen — mindestens 1 Kind eingetragen
    return (state.kinder?.length || 0) > 0;
}
function appAltGenug() {
    // Erst nach 3 Tagen Nutzung erinnern — nicht gleich beim ersten Öffnen
    const savedAt = state._savedAt;
    return savedAt && (Date.now() - savedAt) > 3 * 86400000;
}
function updateBackupWarnDot() {
    const dot = document.getElementById('backup-warn-dot');
    if (dot) dot.style.display = (backupOverdue() && hasEchteData()) ? 'inline-block' : 'none';
}
function showToast() { document.getElementById('backup-toast')?.classList.add('show'); }
function hideToast() { document.getElementById('backup-toast')?.classList.remove('show'); }
function maybeRemindBackup() {
    updateBackupWarnDot();
    if (backupOverdue() && hasEchteData() && appAltGenug()) setTimeout(showToast, 1200);
}

// ── Utils ─────────────────────────────────────────────────────────

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function heute() {
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getStufe(id) { return state.badges.find(b => b.id === id); }
function getKurs(id) { return state.kurse.find(k => k.id === id); }
function kindObj(id) { return state.kinder.find(k => k.id === id); }

function getStufenProgress(kind, stufeId) {
    const st = getStufe(stufeId);
    if (!st || !st.anforderungen.length) return { done: 0, total: 0, pct: 0 };
    const p = (kind.progress || {})[stufeId] || {};
    // Entweder/Oder-Gruppen zählen als eine Aufgabe (erledigt wenn mind. eine Option gecheckt)
    const gruppen = [...new Set(st.anforderungen.filter(a => a.entwederOder).map(a => a.entwederOder))];
    const einzeln = st.anforderungen.filter(a => !a.entwederOder);
    const total = einzeln.length + gruppen.length;
    let done = einzeln.filter(a => p[a.id]).length;
    gruppen.forEach(g => {
        if (st.anforderungen.filter(a => a.entwederOder === g).some(a => p[a.id])) done++;
    });
    return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

// Stufe, an der das Kind gerade arbeitet = erste nicht-vollständige
function aktuelleStufe(kind) {
    if (!state.badges?.length) return { id: 'unbekannt', name: '?', farbe: '#94a3b8', anforderungen: [] };
    for (const st of state.badges) {
        const p = getStufenProgress(kind, st.id);
        if (p.total > 0 && p.done < p.total) return st;
    }
    return state.badges[state.badges.length - 1];   // alles geschafft → höchste Stufe
}

function alleStufenFertig(kind) {
    return state.badges.every(st => {
        const p = getStufenProgress(kind, st.id);
        return p.total > 0 && p.done === p.total;
    });
}

function kurseAmTag(tag) {
    return state.kurse.filter(k => k.wochentag === tag).sort((a, b) =>
        (a.von || '99:99').localeCompare(b.von || '99:99') || a.name.localeCompare(b.name, 'de')
    );
}
function kinderImKurs(kursId) {
    return state.kinder.filter(k => k.kursId === kursId).sort((a, b) => a.name.localeCompare(b.name, 'de'));
}
function kinderOhneKurs() {
    return state.kinder.filter(k => !k.kursId || !getKurs(k.kursId)).sort((a, b) => a.name.localeCompare(b.name, 'de'));
}
