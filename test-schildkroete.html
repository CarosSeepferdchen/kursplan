<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Schildkröten 2.0 · Test</title>
<style>
    @keyframes waterGrad { 0%,100% { background-position: 0% 60%; } 50% { background-position: 100% 40%; } }
    @keyframes shimmerA { 0%,100% { opacity:.55; transform:translate(0,0) scale(1); } 33% { opacity:.85; transform:translate(45px,-35px) scale(1.08); } 66% { opacity:.40; transform:translate(-25px,22px) scale(.95); } }
    @keyframes shimmerB { 0%,100% { opacity:.45; transform:translate(0,0) scale(1); } 40% { opacity:.70; transform:translate(-40px,30px) scale(1.06); } 75% { opacity:.30; transform:translate(28px,-18px) scale(.97); } }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; margin:0; min-height:100vh; overflow:hidden; position:relative;
        background:linear-gradient(-45deg,#bde4f5,#ddf1fb,#b3dff0,#ceeefa,#a8d8ea,#dff5fc); background-size:500% 500%; animation:waterGrad 20s ease infinite; }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
        background:radial-gradient(ellipse 44% 34% at 14% 24%,rgba(255,255,255,.82) 0%,transparent 65%),radial-gradient(ellipse 36% 52% at 78% 66%,rgba(255,255,255,.6) 0%,transparent 65%),radial-gradient(ellipse 52% 28% at 54% 8%,rgba(255,255,255,.55) 0%,transparent 65%);
        animation:shimmerA 11s ease-in-out infinite; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
        background:radial-gradient(ellipse 32% 48% at 42% 78%,rgba(255,255,255,.6) 0%,transparent 65%),radial-gradient(ellipse 58% 36% at 84% 22%,rgba(255,255,255,.5) 0%,transparent 65%);
        animation:shimmerB 14s ease-in-out infinite; }

    @keyframes turtle-swim-a { 0% { transform:translate(-240px,var(--t-sy,55vh)) rotate(-12deg); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 50% { transform:translate(48vw,var(--t-my,44vh)) rotate(var(--t-mr,-12deg)); } 100% { transform:translate(calc(100vw + 240px),var(--t-ey,32vh)) rotate(-12deg); opacity:0; } }
    @keyframes turtle-swim-b { 0% { transform:translate(calc(100vw + 240px),var(--t-sy,48vh)) scaleX(-1) rotate(-12deg); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 50% { transform:translate(48vw,var(--t-my,60vh)) scaleX(-1) rotate(var(--t-mr,-12deg)); } 100% { transform:translate(-240px,var(--t-ey,70vh)) scaleX(-1) rotate(-12deg); opacity:0; } }

    .turtle-layer { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .turtle { position:absolute; top:0; left:0; }
    .turtle svg { width:100%; height:100%; overflow:visible; display:block; opacity:var(--top,0.3); }

    .t-front-up { transform-box:view-box; transform-origin:126px 72px; animation:flapFU 1.5s ease-in-out infinite; }
    .t-front-lo { transform-box:view-box; transform-origin:126px 108px; animation:flapFL 1.5s ease-in-out infinite; }
    .t-rear-up  { transform-box:view-box; transform-origin:82px 76px;  animation:flapRU 2.4s ease-in-out infinite; }
    .t-rear-lo  { transform-box:view-box; transform-origin:82px 104px; animation:flapRL 2.4s ease-in-out infinite; }
    .t-head     { transform-box:view-box; transform-origin:165px 90px; animation:headbob 3.2s ease-in-out infinite; }
    @keyframes flapFU { 0%,100%{transform:rotate(-17deg);} 50%{transform:rotate(13deg);} }
    @keyframes flapFL { 0%,100%{transform:rotate(17deg);} 50%{transform:rotate(-13deg);} }
    @keyframes flapRU { 0%,100%{transform:rotate(-7deg);} 50%{transform:rotate(8deg);} }
    @keyframes flapRL { 0%,100%{transform:rotate(7deg);} 50%{transform:rotate(-8deg);} }
    @keyframes headbob { 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }

    .panel { position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:50; width:min(92vw,420px);
        background:rgba(255,255,255,.82); backdrop-filter:blur(8px); border:1px solid rgba(12,38,98,.14); border-radius:16px; padding:10px 14px; box-shadow:0 6px 20px rgba(12,38,98,.18); }
    .panel h1 { font-size:15px; margin:0 0 8px; color:#0c2662; font-weight:600; }
    .row { display:flex; align-items:center; gap:10px; margin:7px 0; font-size:13px; color:#1e293b; }
    .row label { flex:0 0 84px; }
    .row input[type=range] { flex:1; accent-color:#2563eb; }
    .row .val { flex:0 0 46px; text-align:right; font-weight:600; color:#0c2662; }
</style>
</head>
<body>
<div class="turtle-layer" id="layer" aria-hidden="true"></div>

<div class="panel">
    <h1>🐢 Schildkröten 2.0 — Tropfen-Panzer + Bumerang-Flossen</h1>
    <div class="row"><label>Anzahl</label><input type="range" id="c-count" min="1" max="8" step="1" value="4"><span class="val" id="v-count">4</span></div>
    <div class="row"><label>Größe</label><input type="range" id="c-size" min="50" max="180" step="5" value="100"><span class="val" id="v-size">100%</span></div>
    <div class="row"><label>Tempo</label><input type="range" id="c-speed" min="50" max="220" step="5" value="100"><span class="val" id="v-speed">100%</span></div>
    <div class="row"><label>Sichtbar</label><input type="range" id="c-op" min="8" max="80" step="2" value="32"><span class="val" id="v-op">32%</span></div>
</div>

<script>
var TURTLE = `<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
  <g class="t-rear-up"><path d="M86,76 C74,54 58,42 46,42 C50,57 60,69 76,78 C80,80 84,79 86,76 Z"/></g>
  <g class="t-rear-lo"><path d="M86,104 C74,126 58,138 46,138 C50,123 60,111 76,102 C80,100 84,101 86,104 Z"/></g>
  <g class="t-front-up"><path d="M126,72 C140,36 164,16 188,10 C186,32 178,52 158,67 C150,73 136,75 126,73 Z"/></g>
  <g class="t-front-lo"><path d="M126,108 C140,144 164,164 188,170 C186,148 178,128 158,113 C150,107 136,105 126,107 Z"/></g>
  <path d="M40,90 C32,87 26,90 26,90 C26,90 32,93 40,91 Z"/>
  <path d="M36,90 C52,46 102,40 132,51 C155,59 165,73 165,90 C165,107 155,121 132,129 C102,140 52,134 36,90 Z"/>
  <g class="t-head"><ellipse cx="178" cy="90" rx="14" ry="11"/></g>
</svg>`;

var layer = document.getElementById('layer');
var cfg = { count:4, size:1, speed:1, op:0.32 };

function rnd(){ return (12 + Math.random()*66).toFixed(1) + 'vh'; }
function swim(el){
    var ltr = el.dataset.dir === 'a';
    var s = 12+Math.random()*66, e = 12+Math.random()*66, avg=(s+e)/2;
    var my, mr;
    if (Math.random()<0.45){ var dev=16+Math.random()*24; my=Math.max(6,Math.min(90,avg+(Math.random()<.5?-dev:dev))); mr=(ltr?-12:-12)+(my<avg?-8:8); }
    else { my=avg+(Math.random()-.5)*10; mr=-12; }
    el.style.setProperty('--t-sy',s.toFixed(1)+'vh'); el.style.setProperty('--t-my',my.toFixed(1)+'vh');
    el.style.setProperty('--t-ey',e.toFixed(1)+'vh'); el.style.setProperty('--t-mr',mr.toFixed(1)+'deg');
    var base = ltr?22:27;
    var dur = (base/cfg.speed + (Math.random()-.5)*4).toFixed(1);
    el.style.animation='none'; void el.offsetWidth;
    el.style.animation = (ltr?'turtle-swim-a':'turtle-swim-b')+' '+dur+'s ease-in-out forwards';
    el.addEventListener('animationend', function(){ swim(el); }, { once:true });
}

function build(){
    layer.innerHTML='';
    layer.style.color = 'rgb(11,46,82)';
    layer.style.setProperty('--top', cfg.op);
    var w = Math.round(190*cfg.size), h = Math.round(w*180/220);
    for (var i=0;i<cfg.count;i++){
        var d=document.createElement('div');
        d.className='turtle'; d.style.width=w+'px'; d.style.height=h+'px';
        d.dataset.dir = (i%2===0)?'a':'b';
        d.innerHTML=TURTLE;
        layer.appendChild(d);
        (function(el,idx){ setTimeout(function(){ swim(el); }, idx*1400 + Math.random()*800); })(d,i);
    }
}

function bind(id,vid,fn,suffix){
    var el=document.getElementById(id), v=document.getElementById(vid);
    el.addEventListener('input', function(){ v.textContent=el.value+(suffix||''); fn(+el.value); });
}
bind('c-count','v-count',function(x){ cfg.count=x; build(); },'');
bind('c-size','v-size',function(x){ cfg.size=x/100; build(); },'%');
bind('c-speed','v-speed',function(x){ cfg.speed=x/100; build(); },'%');
bind('c-op','v-op',function(x){ cfg.op=x/100; layer.style.setProperty('--top', cfg.op); },'%');
build();
</script>
</body>
</html>
