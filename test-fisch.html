<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Schildkröten-Test · SVG ⇄ Lottie</title>
<style>
    @keyframes waterGrad { 0%,100% { background-position: 0% 60%; } 50% { background-position: 100% 40%; } }
    @keyframes shimmerA { 0%,100% { opacity:.55; transform:translate(0,0) scale(1); } 33% { opacity:.85; transform:translate(45px,-35px) scale(1.08); } 66% { opacity:.40; transform:translate(-25px,22px) scale(.95); } }
    @keyframes shimmerB { 0%,100% { opacity:.45; transform:translate(0,0) scale(1); } 40% { opacity:.70; transform:translate(-40px,30px) scale(1.06); } 75% { opacity:.30; transform:translate(28px,-18px) scale(.97); } }
    @keyframes shimmerC { 0%,100% { opacity:.75; transform:translate(0,0) scaleX(1); } 20% { opacity:.95; transform:translate(30px,-20px) scaleX(1.05); } 45% { opacity:.55; transform:translate(-18px,35px) scaleX(.97); } 70% { opacity:.88; transform:translate(22px,-12px) scaleX(1.03); } }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(-45deg, #bde4f5, #ddf1fb, #b3dff0, #ceeefa, #a8d8ea, #dff5fc);
        background-size: 500% 500%;
        animation: waterGrad 20s ease infinite;
        color: #1e293b; min-height: 100vh; position: relative; margin: 0;
        overflow: hidden;
    }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
        background: radial-gradient(ellipse 44% 34% at 14% 24%, rgba(255,255,255,.82) 0%, transparent 65%), radial-gradient(ellipse 36% 52% at 78% 66%, rgba(255,255,255,.65) 0%, transparent 65%), radial-gradient(ellipse 52% 28% at 54% 8%, rgba(255,255,255,.60) 0%, transparent 65%);
        animation: shimmerA 11s ease-in-out infinite; }
    body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
        background: radial-gradient(ellipse 32% 48% at 42% 78%, rgba(255,255,255,.62) 0%, transparent 65%), radial-gradient(ellipse 58% 36% at 84% 22%, rgba(255,255,255,.55) 0%, transparent 65%), radial-gradient(ellipse 38% 42% at 18% 88%, rgba(255,255,255,.58) 0%, transparent 65%);
        animation: shimmerB 14s ease-in-out infinite; }
    .water-shimmer { position:fixed; inset:0; pointer-events:none; z-index:0; mix-blend-mode:screen;
        background: radial-gradient(ellipse 10% 6% at 22% 35%, rgba(255,255,255,.92) 0%, rgba(255,255,255,0) 100%), radial-gradient(ellipse 7% 11% at 72% 20%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 100%), radial-gradient(ellipse 9% 5% at 48% 68%, rgba(255,255,255,.78) 0%, rgba(255,255,255,0) 100%), radial-gradient(ellipse 11% 5% at 8% 78%, rgba(255,255,255,.68) 0%, rgba(255,255,255,0) 100%);
        animation: shimmerC 8s ease-in-out infinite; }

    /* ── SVG-Schildkröten (aktuelle Lösung) ── */
    @keyframes turtle-swim-a { 0% { transform: translate(-220px, var(--t-sy,55vh)) rotate(-14deg); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 50% { transform: translate(50vw, var(--t-my,44vh)) rotate(var(--t-mr,-14deg)); } 100% { transform: translate(calc(100vw + 220px), var(--t-ey,32vh)) rotate(-14deg); opacity:0; } }
    @keyframes turtle-swim-b { 0% { transform: translate(calc(100vw + 220px), var(--t-sy,48vh)) rotate(162deg); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 50% { transform: translate(50vw, var(--t-my,60vh)) rotate(var(--t-mr,162deg)); } 100% { transform: translate(-220px, var(--t-ey,70vh)) rotate(162deg); opacity:0; } }
    @keyframes turtle-flap { 0%,100% { transform: scaleY(1) rotate(0deg); } 25% { transform: scaleY(0.93) rotate(-0.4deg); } 75% { transform: scaleY(1.04) rotate(0.4deg); } }
    .turtle-layer { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .turtle { position:absolute; top:0; left:0; width:200px; height:180px; color:rgba(12,38,98,0.13); filter:blur(1.5px); }
    .turtle svg { width:100%; height:100%; animation:turtle-flap 2.2s ease-in-out infinite; }

    /* ── Lottie-Schatten (Test) ── */
    .lottie-layer { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; display:none; }
    .lfish { position:absolute; top:0; left:0; width:230px; height:90px; filter:brightness(0) blur(1.4px); opacity:.26; }
    .lfish svg, .lfish canvas { width:100% !important; height:100% !important; }
    @keyframes fish-ltr { 0% { transform: translate(-260px, var(--t-sy,40vh)); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 100% { transform: translate(calc(100vw + 260px), var(--t-ey,55vh)); opacity:0; } }
    @keyframes fish-rtl { 0% { transform: translate(calc(100vw + 260px), var(--t-sy,40vh)) scaleX(-1); opacity:0; } 8%{opacity:1;} 92%{opacity:1;} 100% { transform: translate(-260px, var(--t-ey,55vh)) scaleX(-1); opacity:0; } }

    .mode-bar { position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50; display:flex; gap:8px; align-items:center; background:rgba(255,255,255,.78); backdrop-filter:blur(6px); border:1px solid rgba(12,38,98,.15); border-radius:999px; padding:7px 9px 7px 16px; box-shadow:0 4px 16px rgba(12,38,98,.18); font-size:14px; }
    .mode-bar b { color:#0c2662; }
    .mode-bar button { font-family:inherit; font-size:14px; cursor:pointer; border:none; border-radius:999px; padding:8px 16px; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; box-shadow:0 2px 8px rgba(37,99,235,.4); }
    .mode-bar button:active { transform:scale(.97); }
    #mode-name { min-width:54px; text-align:center; }
    .hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:50; background:rgba(255,255,255,.75); border-radius:12px; padding:8px 14px; font-size:13px; color:#334155; box-shadow:0 2px 10px rgba(12,38,98,.15); text-align:center; max-width:90vw; }
</style>
</head>
<body>
<div class="water-shimmer" aria-hidden="true"></div>

<div class="turtle-layer" id="layer-svg" aria-hidden="true">
    <div class="turtle turtle-a"><svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M 72,62 C 66,46 54,33 42,30 C 38,34 44,44 54,49 C 64,53 72,58 76,68 Z"/>
        <path d="M 72,118 C 66,134 54,147 42,150 C 38,146 44,136 54,131 C 64,127 72,122 76,112 Z"/>
        <path d="M 107,56 C 104,38 108,18 116,6 C 122,4 128,8 128,18 C 126,32 122,48 120,60 Z"/>
        <path d="M 107,124 C 104,142 108,162 116,174 C 122,176 128,172 128,162 C 126,148 122,132 120,120 Z"/>
        <ellipse cx="100" cy="90" rx="44" ry="40"/>
        <path d="M 56,86 C 48,83 42,88 42,88 C 42,88 48,93 56,91 Z"/>
        <path d="M 143,82 C 152,79 163,83 168,90 C 163,97 152,101 143,98 Z"/>
        <ellipse cx="178" cy="90" rx="15" ry="12"/>
    </svg></div>
    <div class="turtle turtle-b"><svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M 72,62 C 66,46 54,33 42,30 C 38,34 44,44 54,49 C 64,53 72,58 76,68 Z"/>
        <path d="M 72,118 C 66,134 54,147 42,150 C 38,146 44,136 54,131 C 64,127 72,122 76,112 Z"/>
        <path d="M 107,56 C 104,38 108,18 116,6 C 122,4 128,8 128,18 C 126,32 122,48 120,60 Z"/>
        <path d="M 107,124 C 104,142 108,162 116,174 C 122,176 128,172 128,162 C 126,148 122,132 120,120 Z"/>
        <ellipse cx="100" cy="90" rx="44" ry="40"/>
        <path d="M 56,86 C 48,83 42,88 42,88 C 42,88 48,93 56,91 Z"/>
        <path d="M 143,82 C 152,79 163,83 168,90 C 163,97 152,101 143,98 Z"/>
        <ellipse cx="178" cy="90" rx="15" ry="12"/>
    </svg></div>
</div>

<div class="lottie-layer" id="layer-lottie" aria-hidden="true">
    <div class="lfish" id="lf1"></div>
    <div class="lfish" id="lf2"></div>
</div>

<div class="mode-bar">
    <span>Modus: <b id="mode-name">SVG</b></span>
    <button id="toggle">umschalten ⇄</button>
</div>
<div class="hint">Schau auf den Wasser-Hintergrund. Mit „umschalten ⇄" wechselst du zwischen der jetzigen Lösung (SVG-Schildkröten) und der Lottie-Variante (hier ein Fisch-Schwarm als Platzhalter – noch keine Schildkröte).</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
(function () {
    var sy = function () { return (15 + Math.random() * 60).toFixed(1) + 'vh'; };

    // ── SVG-Schildkröten schwimmen (wie in der App) ──
    function swimTurtle(el) {
        var ltr = el.classList.contains('turtle-a');
        var baseRot = ltr ? -14 : 162;
        var s = 15 + Math.random() * 65, e = 15 + Math.random() * 65, avg = (s + e) / 2;
        var my, mr;
        if (Math.random() < 0.35) { var dev = 18 + Math.random() * 22; my = Math.max(8, Math.min(88, avg + (Math.random() < .5 ? -dev : dev))); mr = baseRot + (my < avg ? -7 : 7) * (ltr ? 1 : -1); }
        else { my = avg + (Math.random() - .5) * 8; mr = baseRot; }
        el.style.setProperty('--t-sy', s.toFixed(1) + 'vh'); el.style.setProperty('--t-my', my.toFixed(1) + 'vh');
        el.style.setProperty('--t-ey', e.toFixed(1) + 'vh'); el.style.setProperty('--t-mr', mr.toFixed(1) + 'deg');
        var dur = ((ltr ? 22 : 27) + (Math.random() - .5) * 4).toFixed(1);
        el.style.animation = 'none'; void el.offsetWidth;
        el.style.animation = (ltr ? 'turtle-swim-a' : 'turtle-swim-b') + ' ' + dur + 's ease-in-out forwards';
        el.addEventListener('animationend', function () { swimTurtle(el); }, { once: true });
    }
    document.querySelectorAll('.turtle-a, .turtle-b').forEach(function (el, i) {
        setTimeout(function () { swimTurtle(el); }, i === 0 ? Math.random() * 600 : 6000 + Math.random() * 3000);
    });

    // ── Lottie laden ──
    ['lf1', 'lf2'].forEach(function (id) {
        lottie.loadAnimation({ container: document.getElementById(id), renderer: 'svg', loop: true, autoplay: true, path: 'fish.json' });
    });
    function swimFish(el, ltr) {
        el.style.setProperty('--t-sy', sy()); el.style.setProperty('--t-ey', sy());
        var dur = ((ltr ? 20 : 26) + (Math.random() - .5) * 5).toFixed(1);
        el.style.animation = 'none'; void el.offsetWidth;
        el.style.animation = (ltr ? 'fish-ltr' : 'fish-rtl') + ' ' + dur + 's linear forwards';
        el.addEventListener('animationend', function () { swimFish(el, ltr); }, { once: true });
    }

    // ── Umschalter ──
    var mode = 'svg';
    var fishStarted = false;
    document.getElementById('toggle').addEventListener('click', function () {
        mode = (mode === 'svg') ? 'lottie' : 'svg';
        document.getElementById('mode-name').textContent = (mode === 'svg') ? 'SVG' : 'Lottie';
        document.getElementById('layer-svg').style.display = (mode === 'svg') ? 'block' : 'none';
        document.getElementById('layer-lottie').style.display = (mode === 'lottie') ? 'block' : 'none';
        if (mode === 'lottie' && !fishStarted) { fishStarted = true; swimFish(document.getElementById('lf1'), true); setTimeout(function () { swimFish(document.getElementById('lf2'), false); }, 2500); }
    });
})();
</script>
</body>
</html>
